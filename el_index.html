<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>이엘컴퍼니 통합관리</title>

<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-main: #F5F5F7;
    --bg-card: #FFFFFF;
    --text-primary: #1D1D1F;
    --text-secondary: #86868B;
    --text-tertiary: #C7C7CC;
    --border: #E5E5EA;
    --border-light: #F2F2F7;
    --hover: #FAFAFA;
    --active: #F0F0F2;
    --accent: #1D1D1F;
  }
  body {
    font-family: 'Inter', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-main);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
  }
  .logo-main { font-family: 'Inter', sans-serif; font-weight: 300; letter-spacing: 0.15em; }
  .sidebar-item { transition: background 0.15s ease; }
  .sidebar-item:hover { background: var(--hover); }
  .sidebar-item.active { background: var(--active); font-weight: 600; }
  .sub-item { padding-left: 2.75rem; font-size: 0.875rem; color: var(--text-secondary); transition: all 0.15s ease; }
  .sub-item:hover { color: var(--text-primary); background: var(--hover); }
  .sub-item.active { color: var(--text-primary); background: var(--active); font-weight: 600; }
  .accordion-arrow { transition: transform 0.2s ease; }
  .accordion-arrow.open { transform: rotate(90deg); }
  .main-card { background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border); }
  .placeholder-box { background: var(--bg-card); border: 2px dashed var(--border); border-radius: 16px; padding: 4rem 2rem; text-align: center; }
  .version-badge { font-size: 0.625rem; color: var(--text-tertiary); letter-spacing: 0.05em; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #D1D1D6; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #AEAEB2; }

  .type-main-btn { transition: all 0.2s ease; background: white; border: 2px solid var(--border); }
  .type-main-btn:hover { border-color: var(--text-primary); transform: translateY(-2px); }
  .type-main-btn.selected { border-color: var(--text-primary); background: #F9F9FB; }
  .type-sub-btn { transition: all 0.15s ease; background: white; border: 1px solid var(--border); color: var(--text-secondary); }
  .type-sub-btn:hover { border-color: var(--text-primary); color: var(--text-primary); }
  .type-sub-btn.selected { background: var(--text-primary); color: white; border-color: var(--text-primary); }

  .mindmap-card { background: white; border: 1.5px solid var(--border); border-radius: 14px; padding: 1rem; transition: all 0.2s ease; }
  .mindmap-card:hover { border-color: var(--text-secondary); box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
  .mindmap-card.filled { border-color: #C0C0C5; background: #FAFAFA; }

  .silhouette-box { background: white; border: 2px solid var(--border); border-radius: 16px; display: flex; align-items: center; justify-content: center; min-height: 340px; }

  .input-field { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid var(--border); border-radius: 8px; font-size: 0.875rem; background: white; transition: border-color 0.15s ease; }
  .input-field:focus { outline: none; border-color: var(--text-primary); }
  .input-field-sm { width: 100%; padding: 0.375rem 0.5rem; border: 1px solid var(--border); border-radius: 6px; font-size: 0.75rem; background: white; transition: border-color 0.15s ease; }
  .input-field-sm:focus { outline: none; border-color: var(--text-primary); }
  .btn-primary { background: var(--text-primary); color: white; padding: 0.625rem 1.25rem; border-radius: 10px; font-size: 0.875rem; font-weight: 500; transition: opacity 0.15s ease; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-secondary { background: white; color: var(--text-primary); padding: 0.625rem 1.25rem; border-radius: 10px; font-size: 0.875rem; font-weight: 500; border: 1px solid var(--border); transition: all 0.15s ease; }
  .btn-secondary:hover { background: var(--hover); }

  .product-card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 1rem; cursor: pointer; transition: all 0.2s ease; }
  .product-card:hover { border-color: var(--text-primary); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.06); }

  .badge { display: inline-block; padding: 0.125rem 0.5rem; border-radius: 6px; font-size: 0.625rem; font-weight: 500; background: var(--active); color: var(--text-secondary); }

  .autocomplete-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid var(--border); border-radius: 8px; margin-top: 4px; max-height: 200px; overflow-y: auto; z-index: 40; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  .autocomplete-item { padding: 8px 12px; cursor: pointer; font-size: 0.8rem; }
  .autocomplete-item:hover { background: var(--hover); }

  .toast { position: fixed; bottom: 24px; right: 24px; background: white; border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.12); z-index: 100; max-width: 400px; }

  .color-row-display { display: grid; grid-template-columns: 1fr auto; gap: 4px; align-items: center; margin-bottom: 4px; padding: 6px 8px; background: white; border: 1px solid var(--border); border-radius: 6px; }

</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

// ═══════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════

      </svg>);
    case 'knit':
      return (<svg viewBox="0 0 50 50" width={size} height={size}>

      </svg>);

// ═══════════════════════════════════════════════════════════
// 유틸
// ═══════════════════════════════════════════════════════════
const storage = {
  get(key, fallback) {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
    catch { return fallback; }
  },
  set(key, value) { try { localStorage.setItem(key, JSON.stringify(value)); } catch {} }
};

// ═══════════════════════════════════════════════════════════
// 자동완성 입력 컴포넌트
// ═══════════════════════════════════════════════════════════
function AutocompleteInput({ value, onChange, onSelect, suggestions, placeholder, getLabel, getKey, className = "input-field" }) {
  const [open, setOpen] = useState(false);
  const [query, setQuery] = useState(value || '');
  const ref = useRef(null);

  useEffect(() => { setQuery(value || ''); }, [value]);

  useEffect(() => {
    const handler = (e) => {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const filtered = useMemo(() => {
    if (!query) return suggestions;
    const q = query.toLowerCase();
    return suggestions.filter(s => getLabel(s).toLowerCase().includes(q));
  }, [query, suggestions, getLabel]);

  return (
    <div className="relative" ref={ref}>
      <input
        type="text"
        className={className}
        value={query}
        onChange={e => { setQuery(e.target.value); onChange(e.target.value); setOpen(true); }}
        onFocus={() => setOpen(true)}
        placeholder={placeholder}
      />
      {open && filtered.length > 0 && (
        <div className="autocomplete-dropdown">
          {filtered.map(s => (
            <div key={getKey(s)} className="autocomplete-item"
              onClick={() => {
                onSelect(s);
                setQuery(getLabel(s));
                setOpen(false);
              }}>
              {getLabel(s)}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// 사이드바 / 헤더
// ═══════════════════════════════════════════════════════════
function Sidebar({ active, setActive }) {
  const [openGroups, setOpenGroups] = useState({ products: true });
  const toggleGroup = (id) => setOpenGroups(prev => ({ ...prev, [id]: !prev[id] }));
  const handleMenuClick = (menu) => {
    if (menu.type === 'single') setActive(menu.id);
    else toggleGroup(menu.id);
  };

  return (
    <aside className="w-64 bg-white border-r border-gray-200 flex flex-col h-screen sticky top-0">
      <div className="px-6 py-7 border-b border-gray-100">
        <div className="logo-main text-xl text-gray-900">ELCOMPANY</div>
        <div className="text-xs text-gray-500 mt-1 font-light">이엘컴퍼니 통합관리</div>
      </div>

      <nav className="flex-1 overflow-y-auto py-3">
        {MENU.map((menu) => {
          const isGroup = menu.type === 'group';
          const isActiveMenu = active === menu.id;
          const hasActiveChild = menu.children?.some(c => c.id === active);

          return (
            <div key={menu.id}>
              <button onClick={() => handleMenuClick(menu)}
                className={`sidebar-item w-full flex items-center gap-3 px-6 py-3 text-left text-sm ${(isActiveMenu || hasActiveChild) ? 'active' : ''}`}>
                <span className="text-base w-5">{menu.icon}</span>
                <span className="flex-1">
                  {menu.number && <span className="text-gray-400 mr-1">{menu.number}.</span>}
                  {menu.label}
                </span>
                {isGroup && (
                  <span className={`accordion-arrow text-xs text-gray-400 ${openGroups[menu.id] ? 'open' : ''}`}>▶</span>
                )}
              </button>
              {isGroup && openGroups[menu.id] && (
                <div className="py-1">
                  {menu.children.map((child) => (
                    <button key={child.id} onClick={() => setActive(child.id)}
                      className={`sub-item w-full flex items-center gap-2 py-2 text-left ${active === child.id ? 'active' : ''}`}>
                      <span className="text-gray-400 text-xs">{child.number}</span>
                      <span>{child.label}</span>
                    </button>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </nav>

      <div className="px-6 py-3 border-t border-gray-100">
        <div className="version-badge">v20260425.04</div>
      </div>
    </aside>
  );
}

function Header({ tabMeta }) {
  return (
    <div className="bg-white border-b border-gray-200 px-8 py-5 sticky top-0 z-10">
      <div className="flex items-center gap-3">
        <span className="text-2xl">{tabMeta.icon}</span>
        <div>
          <div className="flex items-baseline gap-2">
            {tabMeta.number && <span className="text-sm text-gray-400 font-medium">{tabMeta.number}</span>}
            <h1 className="text-xl font-semibold text-gray-900">{tabMeta.label}</h1>
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// 마인드맵 카드 래퍼
// ═══════════════════════════════════════════════════════════
function MindmapCard({ title, filled, children }) {
  return (
    <div className={`mindmap-card ${filled ? 'filled' : ''}`}>
      <div className="text-xs font-semibold text-gray-700 mb-3">{title}</div>
      <div className="space-y-2">{children}</div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// 토스트 알림
// ═══════════════════════════════════════════════════════════
function Toast({ messages, onClose }) {
  if (!messages || messages.length === 0) return null;
  useEffect(() => {
    const t = setTimeout(onClose, 4000);
    return () => clearTimeout(t);
  }, [messages]);

  return (
    <div className="toast">
      <div className="text-sm font-semibold text-gray-900 mb-2">✅ 저장 완료</div>
      {messages.map((m, i) => (
        <div key={i} className="text-xs text-gray-600">• {m}</div>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// 상품 폼
// ═══════════════════════════════════════════════════════════
function ProductForm({ product, types, vendors, materialKinds, onSave, onCancel }) {
  const [form, setForm] = useState(() => product ? JSON.parse(JSON.stringify(product)) : {
    name: '', typeId: null, typeSelections: {}, image: '',
    sizes: [],
    fabric: {
      vendorName: '', vendorPhone: '', vendorAddr: '', vendorBizNo: '',
      name: '', colors: [], unit: 'yds', price: 0, yoChuk: 0
    },
    materials: [], // { vendorName, vendorPhone, vendorAddr, vendorBizNo, name, kind, unit, price, qty }
    sewing: {
      vendorName: '', vendorPhone: '', vendorAddr: '', vendorBizNo: '', price: 0
    },
    processing: {
      dyeing: { use: false, vendorName: '', vendorPhone: '', vendorAddr: '', vendorBizNo: '', price: 0 },
      tenter: { use: false, vendorName: '', vendorPhone: '', vendorAddr: '', vendorBizNo: '', price: 0 },
      transfer: { use: false, vendorName: '', vendorPhone: '', vendorAddr: '', vendorBizNo: '', price: 0 },
      printing: { use: false, vendorName: '', vendorPhone: '', vendorAddr: '', vendorBizNo: '', price: 0 },
    },
    elColors: {}, // { '거래처컬러명': '이엘컬러명' }
  });

  const selectedType = types[form.typeId];
  const SIZE_OPTIONS = ['S', 'M', 'L', '55', '66', '77', 'FREE'];

  // 원가 계산
  const totalCost = useMemo(() => {
    let c = 0;
    if (form.fabric) c += (form.fabric.yoChuk || 0) * (form.fabric.price || 0);
    if (form.sewing) c += form.sewing.price || 0;
    (form.materials || []).forEach(m => c += (m.qty || 0) * (m.price || 0));
    Object.values(form.processing || {}).forEach(p => { if (p.use) c += p.price || 0; });
    return Math.round(c);
  }, [form]);

  // 이미지 업로드
  const handleImageUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setForm(prev => ({ ...prev, image: ev.target.result }));
    reader.readAsDataURL(file);
  };

  // ─── 원단 관련 ───
  const setFabricField = (field, val) => setForm(prev => ({ ...prev, fabric: { ...prev.fabric, [field]: val } }));
  
  const handleFabricVendorSelect = (vendor) => {
    setForm(prev => ({ ...prev, fabric: {
      ...prev.fabric,
      vendorName: vendor.name,
      vendorPhone: vendor.phone || '',
      vendorAddr: vendor.addr || '',
      vendorBizNo: vendor.bizNo || '',
      name: vendor.fabricName || prev.fabric.name,
    } }));
  };

  const addFabricColor = () => {
    setForm(prev => ({ ...prev, fabric: { ...prev.fabric, colors: [...(prev.fabric.colors || []), ''] } }));
  };
  const updateFabricColor = (idx, val) => {
    setForm(prev => ({
      ...prev,
      fabric: { ...prev.fabric, colors: prev.fabric.colors.map((c, i) => i === idx ? val : c) }
    }));
  };
  const removeFabricColor = (idx) => {
    const removed = form.fabric.colors[idx];
    setForm(prev => {
      const newColors = prev.fabric.colors.filter((_, i) => i !== idx);
      const newElColors = { ...prev.elColors };
      if (removed) delete newElColors[removed];
      return { ...prev, fabric: { ...prev.fabric, colors: newColors }, elColors: newElColors };
    });
  };

  // ─── 부자재 관련 ───
  const addMaterial = () => setForm(prev => ({
    ...prev,
    materials: [...prev.materials, {
      vendorName: '', vendorPhone: '', vendorAddr: '', vendorBizNo: '',
      name: '', kind: '', unit: 'ea', price: 0, qty: 1
    }]
  }));

  const updateMaterial = (idx, field, val) => setForm(prev => ({
    ...prev,
    materials: prev.materials.map((m, i) => i === idx ? { ...m, [field]: val } : m)
  }));

  const handleMaterialVendorSelect = (idx, vendor) => {
    updateMaterial(idx, 'vendorName', vendor.name);
    updateMaterial(idx, 'vendorPhone', vendor.phone || '');
    updateMaterial(idx, 'vendorAddr', vendor.addr || '');
    updateMaterial(idx, 'vendorBizNo', vendor.bizNo || '');
  };

  const removeMaterial = (idx) => setForm(prev => ({ ...prev, materials: prev.materials.filter((_, i) => i !== idx) }));

  // ─── 봉제 관련 ───
  const setSewingField = (field, val) => setForm(prev => ({ ...prev, sewing: { ...prev.sewing, [field]: val } }));
  
  const handleSewingVendorSelect = (vendor) => {
    setForm(prev => ({ ...prev, sewing: {
      ...prev.sewing,
      vendorName: vendor.name,
      vendorPhone: vendor.phone || '',
      vendorAddr: vendor.addr || '',
      vendorBizNo: vendor.bizNo || '',
    } }));
  };

  // ─── 가공 관련 ───
  const updateProc = (key, field, val) => setForm(prev => ({
    ...prev,
    processing: { ...prev.processing, [key]: { ...prev.processing[key], [field]: val } }
  }));

  const handleProcVendorSelect = (key, vendor) => {
    setForm(prev => ({
      ...prev,
      processing: { ...prev.processing, [key]: {
        ...prev.processing[key],
        vendorName: vendor.name,
        vendorPhone: vendor.phone || '',
        vendorAddr: vendor.addr || '',
        vendorBizNo: vendor.bizNo || '',
      } }
    }));
  };

  // ─── 사이즈 ───
  const toggleSize = (s) => setForm(prev => ({
    ...prev, sizes: prev.sizes.includes(s) ? prev.sizes.filter(x => x !== s) : [...prev.sizes, s]
  }));

  // ─── 이엘 컬러 ───
  const setElColor = (originalColor, elColor) => {
    setForm(prev => ({ ...prev, elColors: { ...prev.elColors, [originalColor]: elColor } }));
  };

  // 자동완성용 vendor 필터
  const fabricVendors = useMemo(() => vendors.filter(v => v.category === 'fabric'), [vendors]);
  const materialVendors = useMemo(() => vendors.filter(v => v.category === 'material'), [vendors]);
  const sewingVendors = useMemo(() => vendors.filter(v => v.category === 'sewing'), [vendors]);
  const procVendors = {
    dyeing: useMemo(() => vendors.filter(v => v.category === 'dyeing'), [vendors]),
    tenter: useMemo(() => vendors.filter(v => v.category === 'tenter'), [vendors]),
    transfer: useMemo(() => vendors.filter(v => v.category === 'transfer'), [vendors]),
    printing: useMemo(() => vendors.filter(v => v.category === 'printing'), [vendors]),
  };

  const canSave = form.name.trim() && form.typeId;
  const fabricColors = form.fabric?.colors?.filter(c => c && c.trim()) || [];

  const PROC_LABELS = { dyeing: '염색', tenter: '텐타', transfer: '전사', printing: '나염' };
  const PROC_UNITS = { dyeing: 'kg', tenter: 'yds', transfer: '판/도수', printing: '판/도수' };

  return (
    <div className="space-y-6 pb-8">
      {/* 타입 선택 */}
      <div className="main-card p-6">
        <div className="text-sm font-semibold text-gray-700 mb-4">1. 타입 선택</div>
        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3 mb-4">
          {Object.values(types).map(t => (
            <button key={t.id} onClick={() => setForm(prev => ({ ...prev, typeId: t.id, typeSelections: {} }))}
              className={`type-main-btn rounded-xl p-4 flex flex-col items-center gap-2 ${form.typeId === t.id ? 'selected' : ''}`}>
              <TypeIcon typeId={t.id} size={44} />
              <div className="text-xs font-medium">{t.label}</div>
            </button>
          ))}
        </div>

        {selectedType && selectedType.flow.length > 0 && (
          <div className="space-y-3 pt-4 border-t border-gray-100">
            {selectedType.flow.map(key => {
              const opts = selectedType.options[key] || [];
              const labelMap = { sleeve: '소매', length: '기장', neck: '넥스타일', shape: '형태', zip: '집업여부', kind: '종류' };
              return (
                <div key={key} className="flex items-center gap-3 flex-wrap">
                  <span className="text-xs font-medium text-gray-500 w-16">{labelMap[key] || key}</span>
                  <div className="flex gap-2 flex-wrap">
                    {opts.map(opt => (
                      <button key={opt.id}
                        onClick={() => setForm(prev => ({ ...prev, typeSelections: { ...prev.typeSelections, [key]: opt.id } }))}
                        className={`type-sub-btn rounded-lg px-3 py-1.5 text-xs ${form.typeSelections?.[key] === opt.id ? 'selected' : ''}`}>
                        {opt.label}
                      </button>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* 마인드맵 */}
      <div className="main-card p-6">
        <div className="text-sm font-semibold text-gray-700 mb-4">2. 생산 정보 (마인드맵)</div>

        <div className="grid grid-cols-1 lg:grid-cols-12 gap-4 items-start">
          {/* 왼쪽 컬럼: 4개 카드 세로 */}
          <div className="lg:col-span-4 space-y-3">
            {/* 🧵 원단 */}
            <MindmapCard title="🧵 원단" filled={!!form.fabric?.vendorName}>
              <div className="section-label">거래처 정보</div>
              <AutocompleteInput
                value={form.fabric?.vendorName}
                onChange={(v) => setFabricField('vendorName', v)}
                onSelect={handleFabricVendorSelect}
                suggestions={fabricVendors}
                placeholder="업체명"
                getLabel={(v) => v.fabricName ? `${v.name} (${v.fabricName})` : v.name}
                getKey={(v) => v.id}
                className="input-field-sm"
              />
              <input type="text" placeholder="전화번호" value={form.fabric?.vendorPhone || ''}
                onChange={e => setFabricField('vendorPhone', e.target.value)}
                className="input-field-sm" />
              <input type="text" placeholder="호수 (예: A동 301호)" value={form.fabric?.vendorAddr || ''}
                onChange={e => setFabricField('vendorAddr', e.target.value)}
                className="input-field-sm" />
              <input type="text" placeholder="사업자번호" value={form.fabric?.vendorBizNo || ''}
                onChange={e => setFabricField('vendorBizNo', e.target.value)}
                className="input-field-sm" />

              <div className="section-label mt-3">원단 정보</div>
              <input type="text" placeholder="원단명 (예: 소프트핏)" value={form.fabric?.name || ''}
                onChange={e => setFabricField('name', e.target.value)}
                className="input-field-sm" />

              {/* 컬러 (거래처 컬러만) */}
              <div className="mt-2">
                <div className="text-xs text-gray-500 mb-1">컬러 (거래처 컬러)</div>
                {(form.fabric?.colors || []).map((c, idx) => (
                  <div key={idx} className="color-row">
                    <input type="text" value={c}
                      onChange={e => updateFabricColor(idx, e.target.value)}
                      placeholder="예: Navy Blue" className="input-field-sm" />
                    <button onClick={() => removeFabricColor(idx)}
                      className="text-red-400 text-xs px-1">✕</button>
                  </div>
                ))}
                <button onClick={addFabricColor}
                  className="w-full text-xs py-1.5 bg-gray-50 hover:bg-gray-100 rounded mt-1">
                  + 색상 추가
                </button>
              </div>

              <div className="section-label mt-3">단가 / 요척</div>
              <div className="flex gap-1">
                <select value={form.fabric?.unit || 'yds'} onChange={e => setFabricField('unit', e.target.value)}
                  className="input-field-sm w-20">
                  <option value="yds">yds</option>
                  <option value="kg">kg</option>
                </select>
                <input type="number" placeholder="단가" value={form.fabric?.price || ''}
                  onChange={e => setFabricField('price', parseFloat(e.target.value) || 0)}
                  className="input-field-sm flex-1" />
              </div>
              <input type="number" step="0.01" placeholder={`요척 (${form.fabric?.unit || 'yds'})`}
                value={form.fabric?.yoChuk || ''}
                onChange={e => setFabricField('yoChuk', parseFloat(e.target.value) || 0)}
                className="input-field-sm" />
              {form.fabric?.yoChuk > 0 && form.fabric?.price > 0 && (
                <div className="text-xs text-gray-500 mt-1">소계: ₩{((form.fabric.yoChuk) * (form.fabric.price)).toFixed(0)}</div>
              )}
            </MindmapCard>

            {/* ⚙ 가공 */}
            <MindmapCard title="⚙ 가공 (염색/텐타/전사/나염)" filled={Object.values(form.processing || {}).some(p => p.use)}>
              {['dyeing', 'tenter', 'transfer', 'printing'].map(key => (
                <div key={key} className="mb-3 pb-3 border-b border-gray-100 last:border-0 last:pb-0 last:mb-0">
                  <label className="flex items-center gap-2 text-xs font-medium mb-2">
                    <input type="checkbox" checked={form.processing[key]?.use || false}
                      onChange={e => updateProc(key, 'use', e.target.checked)} />
                    {PROC_LABELS[key]} <span className="text-gray-400">({PROC_UNITS[key]})</span>
                  </label>
                  {form.processing[key]?.use && (
                    <div className="space-y-1 ml-5">
                      <AutocompleteInput
                        value={form.processing[key].vendorName}
                        onChange={(v) => updateProc(key, 'vendorName', v)}
                        onSelect={(v) => handleProcVendorSelect(key, v)}
                        suggestions={procVendors[key]}
                        placeholder="업체명"
                        getLabel={(v) => v.name}
                        getKey={(v) => v.id}
                        className="input-field-sm"
                      />
                      <input type="text" placeholder="전화번호" value={form.processing[key].vendorPhone || ''}
                        onChange={e => updateProc(key, 'vendorPhone', e.target.value)}
                        className="input-field-sm" />
                      <input type="text" placeholder="주소" value={form.processing[key].vendorAddr || ''}
                        onChange={e => updateProc(key, 'vendorAddr', e.target.value)}
                        className="input-field-sm" />
                      <input type="text" placeholder="사업자번호" value={form.processing[key].vendorBizNo || ''}
                        onChange={e => updateProc(key, 'vendorBizNo', e.target.value)}
                        className="input-field-sm" />
                      <input type="number" placeholder="단가 (원)" value={form.processing[key].price || ''}
                        onChange={e => updateProc(key, 'price', parseFloat(e.target.value) || 0)}
                        className="input-field-sm" />
                    </div>
                  )}
                </div>
              ))}
            </MindmapCard>

            {/* 🔧 부자재 */}
            <MindmapCard title="🔧 부자재" filled={form.materials?.length > 0}>
              {form.materials.map((m, idx) => (
                <div key={idx} className="mb-3 pb-3 border-b border-gray-100 last:border-0 last:pb-0 last:mb-0">
                  <div className="flex items-center justify-between mb-1">
                    <span className="text-xs font-semibold text-gray-500">부자재 #{idx + 1}</span>
                    <button onClick={() => removeMaterial(idx)}
                      className="text-red-400 text-xs">✕ 제거</button>
                  </div>
                  <div className="space-y-1">
                    <AutocompleteInput
                      value={m.vendorName}
                      onChange={(v) => updateMaterial(idx, 'vendorName', v)}
                      onSelect={(v) => handleMaterialVendorSelect(idx, v)}
                      suggestions={materialVendors}
                      placeholder="업체명"
                      getLabel={(v) => v.name}
                      getKey={(v) => v.id}
                      className="input-field-sm"
                    />
                    <input type="text" placeholder="전화번호" value={m.vendorPhone || ''}
                      onChange={e => updateMaterial(idx, 'vendorPhone', e.target.value)}
                      className="input-field-sm" />
                    <input type="text" placeholder="호수" value={m.vendorAddr || ''}
                      onChange={e => updateMaterial(idx, 'vendorAddr', e.target.value)}
                      className="input-field-sm" />
                    <input type="text" placeholder="사업자번호" value={m.vendorBizNo || ''}
                      onChange={e => updateMaterial(idx, 'vendorBizNo', e.target.value)}
                      className="input-field-sm" />
                    <input type="text" placeholder="부자재명" value={m.name}
                      onChange={e => updateMaterial(idx, 'name', e.target.value)}
                      className="input-field-sm" />
                    <input type="text" placeholder="부자재 종류 (예: 고무줄)" value={m.kind}
                      onChange={e => updateMaterial(idx, 'kind', e.target.value)}
                      list={`material-kinds-${idx}`}
                      className="input-field-sm" />
                    <datalist id={`material-kinds-${idx}`}>
                      {materialKinds.map(k => <option key={k} value={k} />)}
                    </datalist>
                    <div className="flex gap-1">
                      <select value={m.unit} onChange={e => updateMaterial(idx, 'unit', e.target.value)}
                        className="input-field-sm w-20">
                        <option value="ea">수량(ea)</option>
                        <option value="yds">yds</option>
                        <option value="kg">kg</option>
                      </select>
                      <input type="number" placeholder="단가" value={m.price}
                        onChange={e => updateMaterial(idx, 'price', parseFloat(e.target.value) || 0)}
                        className="input-field-sm flex-1" />
                    </div>
                    <input type="number" step="0.01" placeholder={`사용량 (${m.unit})`} value={m.qty}
                      onChange={e => updateMaterial(idx, 'qty', parseFloat(e.target.value) || 0)}
                      className="input-field-sm" />
                  </div>
                </div>
              ))}
              <button onClick={addMaterial}
                className="w-full text-xs py-1.5 bg-gray-50 hover:bg-gray-100 rounded">
                + 부자재 추가
              </button>
            </MindmapCard>

            {/* 🏭 봉제 */}
            <MindmapCard title="🏭 봉제" filled={!!form.sewing?.vendorName}>
              <AutocompleteInput
                value={form.sewing?.vendorName}
                onChange={(v) => setSewingField('vendorName', v)}
                onSelect={handleSewingVendorSelect}
                suggestions={sewingVendors}
                placeholder="업체명"
                getLabel={(v) => v.name}
                getKey={(v) => v.id}
                className="input-field-sm"
              />
              <input type="text" placeholder="전화번호" value={form.sewing?.vendorPhone || ''}
                onChange={e => setSewingField('vendorPhone', e.target.value)}
                className="input-field-sm" />
              <input type="text" placeholder="주소" value={form.sewing?.vendorAddr || ''}
                onChange={e => setSewingField('vendorAddr', e.target.value)}
                className="input-field-sm" />
              <input type="text" placeholder="사업자번호" value={form.sewing?.vendorBizNo || ''}
                onChange={e => setSewingField('vendorBizNo', e.target.value)}
                className="input-field-sm" />
              <input type="number" placeholder="공임 (원/장)" value={form.sewing?.price || ''}
                onChange={e => setSewingField('price', parseFloat(e.target.value) || 0)}
                className="input-field-sm" />
            </MindmapCard>
          </div>

          {/* 중앙 컬럼: 상품 이미지 / 실루엣 (Sticky) */}
          <div className="lg:col-span-4 lg:sticky lg:top-24 lg:self-start">
            <div className="silhouette-box relative overflow-hidden" style={{minHeight: '340px'}}>
              <label className="absolute top-3 left-3 z-10 w-9 h-9 rounded-full bg-white border border-gray-200 flex items-center justify-center cursor-pointer hover:bg-gray-50 shadow-sm"
                title={form.image ? "이미지 변경" : "이미지 업로드"}>
                <span className="text-sm">📷</span>
                <input type="file" accept="image/*" onChange={handleImageUpload} className="hidden" />
              </label>

              {form.image && (
                <button onClick={() => setForm(prev => ({ ...prev, image: '' }))}
                  className="absolute top-3 right-3 z-10 w-9 h-9 rounded-full bg-white border border-gray-200 flex items-center justify-center cursor-pointer hover:bg-red-50 hover:border-red-300 shadow-sm"
                  title="이미지 제거">
                  <span className="text-xs">🗑</span>
                </button>
              )}

              {form.image ? (
                <img src={form.image} alt="상품 이미지" className="w-full h-full object-contain p-6" />
              ) : (
                <div className="text-center">
                  <Silhouette typeId={form.typeId} size={180} />
                  {selectedType && (
                    <div className="mt-3 text-xs text-gray-500">
                      {selectedType.label}
                      {selectedType.flow.map(key => {
                        const opts = selectedType.options[key] || [];
                        const sel = opts.find(o => o.id === form.typeSelections?.[key]);
                        return sel ? ` · ${sel.label}` : '';
                      }).join('')}
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>

          {/* 오른쪽 컬럼: 상품 정보 (Sticky) */}
          <div className="lg:col-span-4 lg:sticky lg:top-24 lg:self-start">
            <div className="main-card p-5" style={{maxHeight: 'calc(100vh - 8rem)', overflowY: 'auto'}}>
              <div className="text-xs font-semibold text-gray-700 mb-4">📋 상품 정보</div>
              <div className="space-y-4">
                {/* 상품명 */}
                <div>
                  <label className="text-xs font-medium text-gray-600 block mb-1">상품명</label>
                  <input type="text" value={form.name}
                    onChange={e => setForm(prev => ({ ...prev, name: e.target.value }))}
                    placeholder="예: 글램튜브롱&숏" className="input-field" />
                </div>

                {/* 타입 요약 */}
                {selectedType && (
                  <div>
                    <label className="text-xs font-medium text-gray-600 block mb-1">타입</label>
                    <div className="text-sm text-gray-800 bg-gray-50 rounded-lg px-3 py-2">
                      {selectedType.label}
                      {selectedType.flow.map(key => {
                        const opts = selectedType.options[key] || [];
                        const sel = opts.find(o => o.id === form.typeSelections?.[key]);
                        return sel ? ` · ${sel.label}` : '';
                      }).join('')}
                    </div>
                  </div>
                )}

                {/* 색상 (이엘 컬러) */}
                <div>
                  <label className="text-xs font-medium text-gray-600 block mb-1">색상</label>
                  {fabricColors.length === 0 ? (
                    <div className="text-xs text-orange-600 bg-orange-50 border border-orange-200 rounded-lg px-3 py-2">
                      ⚠️ 원단 정보에서 색상을 먼저 입력하세요
                    </div>
                  ) : (
                    <div className="space-y-1">
                      {fabricColors.map((origColor, i) => (
                        <div key={i} className="flex items-center gap-2">
                          <input type="text"
                            value={form.elColors?.[origColor] || ''}
                            onChange={e => setElColor(origColor, e.target.value)}
                            placeholder="이엘 컬러명 입력"

        </div>

      <div className="flex gap-2 justify-end">

    </div>
  );

function ProductList({ products, types, onNew, onEdit, onDelete, onOpenTypeManager }) {
  const [search, setSearch] = useState('');
  const [filterType, setFilterType] = useState('all');
  const [cardSize, setCardSize] = useState('large');

  const filtered = useMemo(() => {
    return products.filter(p => {
      if (filterType !== 'all' && p.typeId !== filterType) return false;
      if (search && !p.name.includes(search)) return false;
      return true;
    });
  }, [products, search, filterType]);

  const getTypeSummary = (product) => {
    const t = types[product.typeId];
    if (!t) return '';
    const parts = t.flow.map(key => {
      const opts = t.options[key] || [];
      const sel = opts.find(o => o.id === product.typeSelections?.[key]);
      return sel?.label;
    }).filter(Boolean);
    return parts.join(' / ');
  };

  const calculateCost = (p) => {
    let cost = 0;
    if (p.fabric) cost += (p.fabric.yoChuk || 0) * (p.fabric.price || 0);
    if (p.sewing) cost += p.sewing.price || 0;
    (p.materials || []).forEach(m => cost += (m.qty || 0) * (m.price || 0));
    Object.values(p.processing || {}).forEach(proc => { if (proc.use) cost += proc.price || 0; });
    return Math.round(cost);
  };

  return (
    <div className="space-y-6">
      <div className="main-card p-5">
        <div className="flex flex-wrap items-center gap-3">
          <button className="btn-primary" onClick={onNew}>➕ 새 상품 등록</button>
          <button className="btn-secondary" onClick={onOpenTypeManager}>⚙ 타입 관리</button>
          <div className="flex-1"></div>
          <input type="text" placeholder="🔍 상품명 검색..." value={search}
            onChange={e => setSearch(e.target.value)} className="input-field max-w-xs" />
          <select value={filterType} onChange={e => setFilterType(e.target.value)} className="input-field max-w-xs">
            <option value="all">전체 타입</option>
            {Object.values(types).map(t => <option key={t.id} value={t.id}>{t.label}</option>)}
          </select>
          <div className="flex gap-1 text-xs">
            <button onClick={() => setCardSize('large')}
              className={`px-2 py-1 rounded ${cardSize === 'large' ? 'bg-gray-900 text-white' : 'bg-white border'}`}>크게</button>
            <button onClick={() => setCardSize('small')}
              className={`px-2 py-1 rounded ${cardSize === 'small' ? 'bg-gray-900 text-white' : 'bg-white border'}`}>작게</button>
          </div>
        </div>
      </div>

      {filtered.length === 0 ? (
        <div className="placeholder-box">
          <div className="text-5xl mb-4 opacity-40">📦</div>
          <div className="text-lg font-medium text-gray-700 mb-2">등록된 상품이 없습니다</div>
          <div className="text-sm text-gray-500">"새 상품 등록" 버튼을 눌러 시작하세요</div>
        </div>
      ) : (
        <div className={`grid gap-4 ${cardSize === 'large' ? 'grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4' : 'grid-cols-2 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8'}`}>
          {filtered.map(p => (
            <div key={p.id} className="product-card" onClick={() => onEdit(p)}>
              <div className="bg-gray-50 rounded-lg mb-3 flex items-center justify-center aspect-square">
                {p.image ? (
                  <img src={p.image} alt={p.name} className="w-full h-full object-contain rounded-lg" />
                ) : (
                  <div className="opacity-60">
                    <Silhouette typeId={p.typeId} size={cardSize === 'large' ? 120 : 60} />
                  </div>
                )}
              </div>
              <div className="space-y-1">
                <div className={`font-semibold text-gray-900 truncate ${cardSize === 'small' ? 'text-xs' : 'text-sm'}`}>{p.name}</div>
                <div className="flex items-center gap-1 flex-wrap">
                  <span className="badge">{types[p.typeId]?.label || '?'}</span>
                  {cardSize === 'large' && getTypeSummary(p) && (
                    <span className="text-xs text-gray-500">{getTypeSummary(p)}</span>
                  )}
                </div>
                {cardSize === 'large' && (
                  <>
                    <div className="text-xs text-gray-500">
                      색상 {Object.keys(p.elColors || {}).length || p.fabric?.colors?.length || 0} · 사이즈 {p.sizes?.length || 0}
                    </div>
                    <div className="text-sm font-semibold text-gray-900">₩{calculateCost(p).toLocaleString()}</div>
                  </>
                )}
              </div>
              {cardSize === 'large' && (
                <div className="flex gap-1 mt-3 pt-3 border-t border-gray-100">
                  <button onClick={(e) => { e.stopPropagation(); onEdit(p); }}
                    className="flex-1 text-xs py-1.5 bg-gray-50 hover:bg-gray-100 rounded">수정</button>
                  <button onClick={(e) => { e.stopPropagation(); onDelete(p.id); }}
                    className="flex-1 text-xs py-1.5 bg-gray-50 hover:bg-red-50 hover:text-red-600 rounded">삭제</button>
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function NewFlowAdder({ onAdd }) {
  const [val, setVal] = useState('');
  return (
    <div className="flex gap-1">
      <input type="text" value={val} onChange={e => setVal(e.target.value)}
        onKeyPress={e => e.key === 'Enter' && (onAdd(val), setVal(''))}
        placeholder="+ 선택 단계 추가 (예: sleeve)" className="input-field text-xs max-w-xs" />
      <button onClick={() => { onAdd(val); setVal(''); }} className="btn-secondary text-xs">추가</button>
    </div>
  );
}

function TypeManager({ types, onSave, onClose }) {
  const [localTypes, setLocalTypes] = useState(JSON.parse(JSON.stringify(types)));
  const [newTypeName, setNewTypeName] = useState('');
  const [newOptInputs, setNewOptInputs] = useState({});

  const addNewType = () => {
    if (!newTypeName.trim()) return;
    const id = 'custom-' + Date.now();
    setLocalTypes(prev => ({ ...prev, [id]: { id, label: newTypeName.trim(), flow: [], options: {} } }));
    setNewTypeName('');
  };

  const removeType = (id) => {
    if (confirm(`"${localTypes[id]?.label}" 타입을 삭제하시겠습니까?`)) {
      setLocalTypes(prev => { const copy = { ...prev }; delete copy[id]; return copy; });
    }
  };

  const updateTypeLabel = (id, label) => setLocalTypes(prev => ({ ...prev, [id]: { ...prev[id], label } }));

  const addFlowKey = (typeId, key) => {
    if (!key) return;
    setLocalTypes(prev => ({
      ...prev, [typeId]: {
        ...prev[typeId], flow: [...(prev[typeId].flow || []), key],
        options: { ...(prev[typeId].options || {}), [key]: [] }
      }
    }));
  };

  const removeFlowKey = (typeId, key) => {
    setLocalTypes(prev => {
      const t = { ...prev[typeId] };
      t.flow = t.flow.filter(k => k !== key);
      const opts = { ...t.options }; delete opts[key]; t.options = opts;
      return { ...prev, [typeId]: t };
    });
  };

  const addOption = (typeId, flowKey, optInputKey) => {
    const txt = (newOptInputs[optInputKey] || '').trim();
    if (!txt) return;
    const optId = 'opt-' + Date.now();
    setLocalTypes(prev => ({
      ...prev, [typeId]: {
        ...prev[typeId],
        options: {
          ...prev[typeId].options,
          [flowKey]: [...(prev[typeId].options[flowKey] || []), { id: optId, label: txt }]
        }
      }
    }));
    setNewOptInputs(prev => ({ ...prev, [optInputKey]: '' }));
  };

  const removeOption = (typeId, flowKey, optId) => {
    setLocalTypes(prev => ({
      ...prev, [typeId]: {
        ...prev[typeId],
        options: {
          ...prev[typeId].options,
          [flowKey]: prev[typeId].options[flowKey].filter(o => o.id !== optId)
        }
      }
    }));
  };

  const handleSave = () => { onSave(localTypes); onClose(); };

  const handleReset = () => {
    if (confirm('기본 타입으로 초기화하시겠습니까? 사용자 추가 타입은 삭제됩니다.')) {
      setLocalTypes(JSON.parse(JSON.stringify(DEFAULT_TYPES)));
    }
  };

  return (
    <div className="space-y-6">
      <div className="main-card p-5 flex items-center gap-3">
        <button onClick={onClose} className="btn-secondary">← 돌아가기</button>
        <div className="flex-1"></div>
        <button onClick={handleReset} className="btn-secondary text-xs">🔄 기본값 복원</button>
        <button onClick={handleSave} className="btn-primary">💾 저장</button>
      </div>

      <div className="main-card p-5">
        <div className="text-sm font-semibold mb-3">➕ 새 대분류 추가</div>
        <div className="flex gap-2">
          <input type="text" value={newTypeName} onChange={e => setNewTypeName(e.target.value)}
            onKeyPress={e => e.key === 'Enter' && addNewType()}
            placeholder="예: 세트, 언더웨어..." className="input-field max-w-xs" />
          <button onClick={addNewType} className="btn-primary">추가</button>
        </div>
      </div>

      <div className="space-y-3">
        {Object.values(localTypes).map(t => (
          <div key={t.id} className="main-card p-5">
            <div className="flex items-center gap-3 mb-3">
              <input type="text" value={t.label} onChange={e => updateTypeLabel(t.id, e.target.value)}
                className="input-field max-w-xs font-semibold" />
              <button onClick={() => removeType(t.id)}
                className="text-xs text-red-500 hover:text-red-700">🗑 타입 삭제</button>
            </div>

            <div className="pl-4 space-y-3 border-l-2 border-gray-100">
              {t.flow.map(flowKey => (
                <div key={flowKey} className="bg-gray-50 rounded-lg p-3">
                  <div className="flex items-center gap-2 mb-2">
                    <span className="text-xs font-semibold">▸ {flowKey}</span>
                    <button onClick={() => removeFlowKey(t.id, flowKey)}
                      className="text-xs text-red-400">✕ 제거</button>
                  </div>
                  <div className="flex flex-wrap gap-2 mb-2">
                    {(t.options[flowKey] || []).map(opt => (
                      <span key={opt.id} className="badge flex items-center gap-1">
                        {opt.label}
                        <button onClick={() => removeOption(t.id, flowKey, opt.id)}
                          className="text-gray-400 hover:text-red-500">✕</button>
                      </span>
                    ))}
                  </div>
                  <div className="flex gap-1">
                    <input type="text" value={newOptInputs[t.id + '_' + flowKey] || ''}
                      onChange={e => setNewOptInputs(prev => ({ ...prev, [t.id + '_' + flowKey]: e.target.value }))}
                      onKeyPress={e => e.key === 'Enter' && addOption(t.id, flowKey, t.id + '_' + flowKey)}
                      placeholder="옵션 이름" className="input-field text-xs" />
                    <button onClick={() => addOption(t.id, flowKey, t.id + '_' + flowKey)}
                      className="btn-secondary text-xs">+</button>
                  </div>
                </div>
              ))}
              <NewFlowAdder onAdd={(key) => addFlowKey(t.id, key)} />
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// 거래처 자동 취합 로직
// ═══════════════════════════════════════════════════════════
function collectVendorsFromProduct(product, existingVendors) {
  const newVendors = [];
  const findOrCreate = (category, name, phone, addr, bizNo, extra = {}) => {
    if (!name || !name.trim()) return null;
    const existing = existingVendors.find(v => v.category === category && v.name === name);
    if (existing) {
      // 정보 업데이트
      return {
        ...existing,
        phone: phone || existing.phone,
        addr: addr || existing.addr,
        bizNo: bizNo || existing.bizNo,
        ...extra,
        linkedProducts: [...new Set([...(existing.linkedProducts || []), product.id])],
      };
    } else {
      const v = {
        id: 'v-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7),
        category, name, phone: phone || '', addr: addr || '', bizNo: bizNo || '',
        ...extra,
        linkedProducts: [product.id],
        createdAt: Date.now(),
      };
      newVendors.push(v);
      return v;
    }
  };

  const updates = [];
  
  // 원단
  if (product.fabric?.vendorName) {
    const u = findOrCreate('fabric',
      product.fabric.vendorName,
      product.fabric.vendorPhone,
      product.fabric.vendorAddr,
      product.fabric.vendorBizNo,
      { fabricName: product.fabric.name }
    );
    if (u) updates.push(u);
  }

  // 부자재
  (product.materials || []).forEach(m => {
    if (m.vendorName) {
      const u = findOrCreate('material',
        m.vendorName, m.vendorPhone, m.vendorAddr, m.vendorBizNo,
        { materialKind: m.kind }
      );
      if (u) updates.push(u);
    }
  });

  // 봉제
  if (product.sewing?.vendorName) {
    const u = findOrCreate('sewing',
      product.sewing.vendorName,
      product.sewing.vendorPhone,
      product.sewing.vendorAddr,
      product.sewing.vendorBizNo);
    if (u) updates.push(u);
  }

  // 가공
  Object.entries(product.processing || {}).forEach(([key, p]) => {
    if (p.use && p.vendorName) {
      const u = findOrCreate(key, p.vendorName, p.vendorPhone, p.vendorAddr, p.vendorBizNo);
      if (u) updates.push(u);
    }
  });

  // 병합
  const merged = [...existingVendors];
  updates.forEach(u => {
    const idx = merged.findIndex(v => v.id === u.id);
    if (idx >= 0) merged[idx] = u;
    else merged.push(u);
  });

  return { vendors: merged, newVendors };
}

// ═══════════════════════════════════════════════════════════
// 상품마스터 메인
// ═══════════════════════════════════════════════════════════
function ProductsMaster() {
  const [view, setView] = useState('list');
  const [products, setProducts] = useState(() => storage.get('el_products', []));
  const [types, setTypes] = useState(() => storage.get('el_types', DEFAULT_TYPES));
  const [vendors, setVendors] = useState(() => storage.get('el_vendors', []));
  const [materialKinds] = useState(DEFAULT_MATERIAL_KINDS);
  const [editingProduct, setEditingProduct] = useState(null);
  const [toastMessages, setToastMessages] = useState([]);

  // 샘플 데이터
  useEffect(() => {
    const hasSample = storage.get('el_sample_added_v3', false);
    if (!hasSample && products.length === 0) {
      const sample = {
        id: 'sample-1', name: '글램튜브롱&숏', typeId: 'tshirt',
        typeSelections: { sleeve: 'sleeveless', neck: 'round' },
        image: '', sizes: ['S', 'M', 'L'],
        fabric: {
          vendorName: '충남', vendorPhone: '02-123-4567',
          vendorAddr: 'A동 301호', vendorBizNo: '123-45-67890',
          name: '소프트핏',
          colors: ['Navy', 'White'],
          unit: 'yds', price: 4500, yoChuk: 0.35
        },
        materials: [
          {
            vendorName: 'OO부자재', vendorPhone: '', vendorAddr: '', vendorBizNo: '',
            name: '사이즈라벨', kind: '사이즈라벨', unit: 'ea', price: 300, qty: 1
          },
        ],
        sewing: {
          vendorName: 'OO봉제', vendorPhone: '', vendorAddr: '', vendorBizNo: '',
          price: 3000
        },
        processing: {
          dyeing: { use: false, vendorName: '', vendorPhone: '', vendorAddr: '', vendorBizNo: '', price: 0 },
          tenter: { use: false, vendorName: '', vendorPhone: '', vendorAddr: '', vendorBizNo: '', price: 0 },
          transfer: { use: false, vendorName: '', vendorPhone: '', vendorAddr: '', vendorBizNo: '', price: 0 },
          printing: { use: false, vendorName: '', vendorPhone: '', vendorAddr: '', vendorBizNo: '', price: 0 },
        },
        elColors: { 'Navy': '네이비', 'White': '화이트' },
        createdAt: Date.now(),
      };
      setProducts([sample]);
      // 샘플 거래처도 자동 취합
      const { vendors: v } = collectVendorsFromProduct(sample, []);
      setVendors(v);
      storage.set('el_products', [sample]);
      storage.set('el_vendors', v);
      storage.set('el_sample_added_v3', true);
    }
  }, []);

  useEffect(() => { storage.set('el_products', products); }, [products]);
  useEffect(() => { storage.set('el_types', types); }, [types]);
  useEffect(() => { storage.set('el_vendors', vendors); }, [vendors]);

  const handleSave = (product) => {
    if (!product.id) {
      product.id = 'p-' + Date.now();
      product.createdAt = Date.now();
    }
    
    // 제품 저장
    setProducts(prev => {
      const exists = prev.find(p => p.id === product.id);
      return exists ? prev.map(p => p.id === product.id ? product : p) : [...prev, product];
    });
    
    // 거래처 자동 취합
    const { vendors: newVendorList, newVendors: added } = collectVendorsFromProduct(product, vendors);
    setVendors(newVendorList);
    
    // 토스트 메시지
    const msgs = [`상품 "${product.name}" 저장 완료`];
    if (added.length > 0) {
      const categoryLabels = {
        fabric: '원단', material: '부자재', sewing: '봉제',
        dyeing: '염색', tenter: '텐타', transfer: '전사', printing: '나염'
      };
      added.forEach(v => msgs.push(`${categoryLabels[v.category] || v.category} 거래처 등록: ${v.name}`));
    }
    setToastMessages(msgs);
    
    setView('list');
    setEditingProduct(null);
  };

  const handleDelete = (id) => {
    if (confirm('이 상품을 삭제하시겠습니까?')) {
      setProducts(prev => prev.filter(p => p.id !== id));
    }
  };

  const handleEdit = (product) => { setEditingProduct(product); setView('form'); };
  const handleNew = () => { setEditingProduct(null); setView('form'); };

  if (view === 'form') {
    return <>
      <ProductForm product={editingProduct} types={types} vendors={vendors} materialKinds={materialKinds}
        onSave={handleSave} onCancel={() => { setView('list'); setEditingProduct(null); }} />
      <Toast messages={toastMessages} onClose={() => setToastMessages([])} />
    </>;
  }

  if (view === 'typeManager') {
    return <TypeManager types={types} onSave={setTypes} onClose={() => setView('list')} />;
  }

  return <>
    <ProductList products={products} types={types}
      onNew={handleNew} onEdit={handleEdit} onDelete={handleDelete}
      onOpenTypeManager={() => setView('typeManager')} />
    <Toast messages={toastMessages} onClose={() => setToastMessages([])} />
  </>;
}

// 거래처관리 (자동 취합 결과 표시)

function VendorsView() {

  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');

  // localStorage 변경 감지
  useEffect(() => {
    const interval = setInterval(() => {
      const latest = storage.get('el_vendors', []);
      if (latest.length !== vendors.length || JSON.stringify(latest) !== JSON.stringify(vendors)) {
        setVendors(latest);
      }
    }, 1000);
    return () => clearInterval(interval);
  }, [vendors]);

  const CATEGORY_LABELS = {
    fabric: '원단', material: '부자재', sewing: '봉제',
    dyeing: '염색', tenter: '텐타', transfer: '전사', printing: '나염'
  };
  const CATEGORY_ICONS = {
    fabric: '🧵', material: '🔧', sewing: '🏭',
    dyeing: '🎨', tenter: '🌡', transfer: '📄', printing: '🖨'
  };

  const filtered = useMemo(() => {
    return vendors.filter(v => {
      if (filter !== 'all' && v.category !== filter) return false;
      if (search && !v.name.includes(search)) return false;
      return true;
    });
  }, [vendors, filter, search]);

  return (
    <div className="space-y-6">
      <div className="main-card p-5">
        <div className="flex flex-wrap items-center gap-3">
          <input type="text" placeholder="🔍 업체명 검색..." value={search}
            onChange={e => setSearch(e.target.value)} className="input-field max-w-xs" />
          <div className="flex-1"></div>
          <div className="flex gap-1 flex-wrap">
            <button onClick={() => setFilter('all')}
              className={`px-3 py-1.5 rounded-lg text-xs ${filter === 'all' ? 'bg-gray-900 text-white' : 'bg-white border'}`}>
              전체 ({vendors.length})
            </button>
            {Object.entries(CATEGORY_LABELS).map(([k, v]) => {
              const count = vendors.filter(ven => ven.category === k).length;
              if (count === 0) return null;
              return (
                <button key={k} onClick={() => setFilter(k)}
                  className={`px-3 py-1.5 rounded-lg text-xs ${filter === k ? 'bg-gray-900 text-white' : 'bg-white border'}`}>
                  {CATEGORY_ICONS[k]} {v} ({count})
                </button>
              );
            })}
          </div>
        </div>
      </div>

      {filtered.length === 0 ? (
        <div className="placeholder-box">
          <div className="text-5xl mb-4 opacity-40">🏢</div>
          <div className="text-lg font-medium text-gray-700 mb-2">등록된 거래처가 없습니다</div>
          <div className="text-sm text-gray-500">상품을 등록하면 거래처가 자동으로 취합됩니다</div>
        </div>
      ) : (
        <div className="grid gap-3 grid-cols-1 md:grid-cols-2 lg:grid-cols-3">
          {filtered.map(v => (
            <div key={v.id} className="main-card p-4">
              <div className="flex items-start justify-between mb-2">
                <div>
                  <div className="flex items-center gap-2">
                    <span className="text-lg">{CATEGORY_ICONS[v.category]}</span>
                    <span className="font-semibold text-gray-900">{v.name}</span>
                  </div>
                  <span className="badge mt-1">{CATEGORY_LABELS[v.category]}</span>
                </div>
                <span className="text-xs text-gray-400">{v.linkedProducts?.length || 0}개 상품</span>
              </div>
              <div className="text-xs text-gray-600 space-y-1 mt-3">
                {v.fabricName && <div>📦 {v.fabricName}</div>}
                {v.materialKind && <div>🔧 {v.materialKind}</div>}
                {v.phone && <div>📞 {v.phone}</div>}
                {v.addr && <div>📍 {v.addr}</div>}
                {v.bizNo && <div>🏢 {v.bizNo}</div>}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// 기타
// ═══════════════════════════════════════════════════════════
function Placeholder({ tabMeta }) {
  return (
    <div className="placeholder-box">
      <div className="text-5xl mb-4 opacity-40">{tabMeta.icon}</div>
      <div className="text-lg font-medium text-gray-700 mb-2">
        {tabMeta.number && <span className="text-gray-400 mr-2">{tabMeta.number}</span>}
        {tabMeta.label}
      </div>
      <div className="text-sm text-gray-500">이 영역은 곧 구현됩니다</div>
    </div>
  );
}

function Dashboard() {
  return (
    <div className="space-y-6">
      <div className="main-card p-8">
        <div className="flex items-center gap-3 mb-2">
          <span className="text-3xl">👋</span>
          <h2 className="text-2xl font-semibold text-gray-900">환영합니다</h2>
        </div>
        <p className="text-gray-500">이엘컴퍼니 통합관리 시스템입니다.</p>
      </div>

      <div className="main-card p-6">
        <div className="text-sm font-semibold text-gray-700 mb-4">시작 가이드</div>
        <div className="space-y-3 text-sm text-gray-600">
          <div className="flex gap-3">
            <span className="w-6 h-6 rounded-full bg-gray-100 flex items-center justify-center text-xs font-semibold">1</span>
            <div>
              <span className="font-medium text-gray-900">상품 등록 (1-1)</span>
              <p className="text-gray-500 mt-0.5">타입 선택 → 마인드맵에 원단/부자재/봉제/가공 정보 입력</p>
            </div>
          </div>
          <div className="flex gap-3">
            <span className="w-6 h-6 rounded-full bg-gray-100 flex items-center justify-center text-xs font-semibold">2</span>
            <div>
              <span className="font-medium text-gray-900">거래처 자동 취합 (3)</span>
              <p className="text-gray-500 mt-0.5">상품 등록 시 입력한 거래처가 자동으로 3번 거래처관리에 등록됩니다</p>
            </div>
          </div>
          <div className="flex gap-3">
            <span className="w-6 h-6 rounded-full bg-gray-100 flex items-center justify-center text-xs font-semibold">3</span>
            <div>
              <span className="font-medium text-gray-900">자동완성 활용</span>
              <p className="text-gray-500 mt-0.5">한 번 등록한 거래처는 다음 상품 등록 시 자동완성으로 빠르게 입력됩니다</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// App
// ═══════════════════════════════════════════════════════════
function App() {
  const [active, setActive] = useState('dashboard');
  const tabMeta = getTabMeta(active);

  const renderContent = () => {
    if (active === 'dashboard') return <Dashboard />;
    if (active === 'products-master') return <ProductsMaster />;
    if (active === 'vendors') return <VendorsView />;
    return <Placeholder tabMeta={tabMeta} />;
  };

  return (
    <div className="flex min-h-screen">
      <Sidebar active={active} setActive={setActive} />
      <main className="flex-1 flex flex-col">
        <Header tabMeta={tabMeta} />
        <div className="p-8 flex-1">{renderContent()}</div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
