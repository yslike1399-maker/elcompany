<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>이엘컴퍼니 통합관리</title>

<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-main: #F5F5F7;
    --bg-card: #FFFFFF;
    --text-primary: #1D1D1F;
    --text-secondary: #86868B;
    --text-tertiary: #C7C7CC;
    --border: #E5E5EA;
    --border-light: #F2F2F7;
    --hover: #FAFAFA;
    --active: #F0F0F2;
    --accent: #1D1D1F;
  }
  body {
    font-family: 'Inter', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-main);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
  }
  .logo-main { font-family: 'Inter', sans-serif; font-weight: 300; letter-spacing: 0.15em; }
  .sidebar-item { transition: background 0.15s ease; }
  .sidebar-item:hover { background: var(--hover); }
  .sidebar-item.active { background: var(--active); font-weight: 600; }
  .sub-item { padding-left: 2.75rem; font-size: 0.875rem; color: var(--text-secondary); transition: all 0.15s ease; }
  .sub-item:hover { color: var(--text-primary); background: var(--hover); }
  .sub-item.active { color: var(--text-primary); background: var(--active); font-weight: 600; }
  .accordion-arrow { transition: transform 0.2s ease; }
  .accordion-arrow.open { transform: rotate(90deg); }
  .main-card { background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border); }
  .placeholder-box { background: var(--bg-card); border: 2px dashed var(--border); border-radius: 16px; padding: 4rem 2rem; text-align: center; }
  .version-badge { font-size: 0.625rem; color: var(--text-tertiary); letter-spacing: 0.05em; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #D1D1D6; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #AEAEB2; }

  .type-main-btn { transition: all 0.2s ease; background: white; border: 2px solid var(--border); }
  .type-main-btn:hover { border-color: var(--text-primary); transform: translateY(-2px); }
  .type-main-btn.selected { border-color: var(--text-primary); background: #F9F9FB; }
  .type-sub-btn { transition: all 0.15s ease; background: white; border: 1px solid var(--border); color: var(--text-secondary); }
  .type-sub-btn:hover { border-color: var(--text-primary); color: var(--text-primary); }
  .type-sub-btn.selected { background: var(--text-primary); color: white; border-color: var(--text-primary); }

  .mindmap-card { background: white; border: 1.5px solid var(--border); border-radius: 14px; padding: 1rem; transition: all 0.2s ease; }
  .mindmap-card:hover { border-color: var(--text-secondary); box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
  .mindmap-card.filled { border-color: #C0C0C5; background: #FAFAFA; }

  .silhouette-box { background: white; border: 2px solid var(--border); border-radius: 16px; display: flex; align-items: center; justify-content: center; min-height: 340px; }

  .input-field { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid var(--border); border-radius: 8px; font-size: 0.875rem; background: white; transition: border-color 0.15s ease; }
  .input-field:focus { outline: none; border-color: var(--text-primary); }
  .input-field-sm { width: 100%; padding: 0.375rem 0.5rem; border: 1px solid var(--border); border-radius: 6px; font-size: 0.75rem; background: white; transition: border-color 0.15s ease; }
  .input-field-sm:focus { outline: none; border-color: var(--text-primary); }
  .btn-primary { background: var(--text-primary); color: white; padding: 0.625rem 1.25rem; border-radius: 10px; font-size: 0.875rem; font-weight: 500; transition: opacity 0.15s ease; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-secondary { background: white; color: var(--text-primary); padding: 0.625rem 1.25rem; border-radius: 10px; font-size: 0.875rem; font-weight: 500; border: 1px solid var(--border); transition: all 0.15s ease; }
  .btn-secondary:hover { background: var(--hover); }

  .product-card:hover { border-color: var(--text-primary); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.06); }

  .badge { display: inline-block; padding: 0.125rem 0.5rem; border-radius: 6px; font-size: 0.625rem; font-weight: 500; background: var(--active); color: var(--text-secondary); }

  .autocomplete-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid var(--border); border-radius: 8px; margin-top: 4px; max-height: 200px; overflow-y: auto; z-index: 40; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  .autocomplete-item { padding: 8px 12px; cursor: pointer; font-size: 0.8rem; }

  .toast { position: fixed; bottom: 24px; right: 24px; background: white; border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.12); z-index: 100; max-width: 400px; }

</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

// ═══════════════════════════════════════════════════════════

const TypeIcon = ({ typeId, size = 48 }) => {

      </svg>);
    case 'tshirt':
      return (<svg viewBox="0 0 50 50" width={size} height={size}>

      </svg>);
    case 'knit':
      return (<svg viewBox="0 0 50 50" width={size} height={size}>
        <circle cx="25" cy="10" r="4" {...common} />
        <path d="M 19 17 L 9 23 L 12 40 L 17 38 L 17 46 L 33 46 L 33 38 L 38 40 L 41 23 L 31 17 Z" {...common} />
        <line x1="22" y1="27" x2="22" y2="45" stroke={stroke} strokeWidth="0.3" opacity="0.5" />
        <line x1="28" y1="27" x2="28" y2="45" stroke={stroke} strokeWidth="0.3" opacity="0.5" />

    case 'sweatshirt':
      return (<svg viewBox="0 0 50 50" width={size} height={size}>
        <circle cx="25" cy="10" r="4" {...common} />

      </svg>);
    case 'bottom':

      </svg>);

// ═══════════════════════════════════════════════════════════
// 유틸
// ═══════════════════════════════════════════════════════════
const storage = {
  get(key, fallback) {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
    catch { return fallback; }
  },
  set(key, value) { try { localStorage.setItem(key, JSON.stringify(value)); } catch {} }
};

// ═══════════════════════════════════════════════════════════
// 자동완성 입력 컴포넌트
// ═══════════════════════════════════════════════════════════
function AutocompleteInput({ value, onChange, onSelect, suggestions, placeholder, getLabel, getKey, className = "input-field" }) {
  const [open, setOpen] = useState(false);
  const [query, setQuery] = useState(value || '');
  const ref = useRef(null);

  useEffect(() => { setQuery(value || ''); }, [value]);

  useEffect(() => {
    const handler = (e) => {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const filtered = useMemo(() => {
    if (!query) return suggestions;
    const q = query.toLowerCase();
    return suggestions.filter(s => getLabel(s).toLowerCase().includes(q));
  }, [query, suggestions, getLabel]);

  return (
    <div className="relative" ref={ref}>
      <input
        type="text"
        className={className}
        value={query}
        onChange={e => { setQuery(e.target.value); onChange(e.target.value); setOpen(true); }}
        onFocus={() => setOpen(true)}
        placeholder={placeholder}
      />
      {open && filtered.length > 0 && (
        <div className="autocomplete-dropdown">
          {filtered.map(s => (
            <div key={getKey(s)} className="autocomplete-item"
              onClick={() => {
                onSelect(s);
                setQuery(getLabel(s));
                setOpen(false);
              }}>
              {getLabel(s)}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// 사이드바 / 헤더
// ═══════════════════════════════════════════════════════════
function Sidebar({ active, setActive }) {
  const [openGroups, setOpenGroups] = useState({ products: true });
  const [showCompanyModal, setShowCompanyModal] = useState(false);
  const fileInputRef = useRef(null);

  const toggleGroup = (id) => setOpenGroups(prev => ({ ...prev, [id]: !prev[id] }));
  const handleMenuClick = (menu) => {
    if (menu.type === 'single') setActive(menu.id);
    else toggleGroup(menu.id);
  };

  // 내보내기
  const handleExport = () => {
    try {
      const data = {
        version: 'v20260425.10',
        exportedAt: new Date().toISOString(),
        products: storage.get('el_products', []),
        types: storage.get('el_types', DEFAULT_TYPES),
        vendors: storage.get('el_vendors', []),
        companyInfo: storage.get('el_company_info', {}),
        orders: storage.get('el_orders', []),
      };
      const json = JSON.stringify(data, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const now = new Date();
      const pad = (n) => String(n).padStart(2, '0');
      const fname = `elcompany-backup-${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}.json`;
      const a = document.createElement('a');
      a.href = url;
      a.download = fname;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      alert(`✅ 내보내기 완료\n\n파일명: ${fname}\n상품: ${data.products.length}개\n거래처: ${data.vendors.length}개\n발주이력: ${data.orders.length}개`);
    } catch (err) {
      alert('❌ 내보내기 실패: ' + err.message);
    }
  };

  // 가져오기
  const handleImport = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!confirm('⚠️ 가져오기를 진행하면 현재 데이터가 모두 덮어쓰기 됩니다.\n\n계속하시겠습니까?')) {
      e.target.value = '';
      return;
    }
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.products || !data.types || !data.vendors) {
          throw new Error('올바른 백업 파일이 아닙니다');
        }
        storage.set('el_products', data.products);
        storage.set('el_types', data.types);
        storage.set('el_vendors', data.vendors);
        if (data.companyInfo) storage.set('el_company_info', data.companyInfo);
        if (data.orders) storage.set('el_orders', data.orders);
        alert(`✅ 가져오기 완료\n\n상품: ${data.products.length}개\n거래처: ${data.vendors.length}개\n\n페이지를 새로고침합니다.`);
        window.location.reload();
      } catch (err) {
        alert('❌ 가져오기 실패: ' + err.message);
      }
      e.target.value = '';
    };
    reader.readAsText(file);
  };

  return (
    <>
    <aside className="w-64 bg-white border-r border-gray-200 flex flex-col h-screen sticky top-0">

function Toast({ messages, onClose }) {
  if (!messages || messages.length === 0) return null;
  useEffect(() => {
    const t = setTimeout(onClose, 4000);
    return () => clearTimeout(t);
  }, [messages]);

  return (
    <div className="toast">
      <div className="text-sm font-semibold text-gray-900 mb-2">✅ 저장 완료</div>
      {messages.map((m, i) => (
        <div key={i} className="text-xs text-gray-600">• {m}</div>
      ))}
    </div>
  );
}

// 신속주문 팝업
// ═══════════════════════════════════════════════════════════
function QuickOrderModal({ product, types, onClose, onSaveOrder }) {
  const companyInfo = storage.get('el_company_info', {});
  const colors = Object.keys(product.elColors || {});
  const sizes = product.sizes || [];
  
  const [quantities, setQuantities] = useState(() => {
    const q = {};
    colors.forEach(origColor => {
      sizes.forEach(size => {
        q[`${origColor}_${size}`] = 0;
      });
    });
    return q;
  });

  const [dueDate, setDueDate] = useState('');
  const [activeTab, setActiveTab] = useState('fabric'); // fabric, material, instruction
  const [fabricShipTo, setFabricShipTo] = useState({
    name: product.sewing?.vendorName || '',
    phone: product.sewing?.vendorPhone || '',
    addr: product.sewing?.vendorAddr || '',
  });
  const [materialShipTo, setMaterialShipTo] = useState({
    name: product.sewing?.vendorName || '',
    phone: product.sewing?.vendorPhone || '',
    addr: product.sewing?.vendorAddr || '',
  });

  const updateQty = (color, size, val) => {
    setQuantities(prev => ({ ...prev, [`${color}_${size}`]: parseInt(val) || 0 }));
  };

  // 총 주문 수량 계산
  const totalQty = Object.values(quantities).reduce((s, q) => s + q, 0);

  // 색상별 총 수량
  const colorTotals = useMemo(() => {
    const t = {};
    colors.forEach(c => {
      t[c] = sizes.reduce((s, sz) => s + (quantities[`${c}_${sz}`] || 0), 0);
    });
    return t;
  }, [quantities, colors, sizes]);

  // 자동 계산 (사이즈별 사용량 기반)
  const sizeQtyMap = useMemo(() => {
    // 사이즈별 총 수량
    const m = {};
    sizes.forEach(sz => {
      m[sz] = colors.reduce((s, c) => s + (quantities[`${c}_${sz}`] || 0), 0);
    });
    return m;
  }, [quantities, sizes, colors]);

  // 값 파싱 헬퍼
  const pNum = (v) => {
    if (v === undefined || v === null || v === '') return 0;
    const n = parseFloat(v);
    return isNaN(n) ? 0 : n;
  };

  const missingUsage = useMemo(() => {
    const missing = [];
    sizes.forEach(sz => {
      if (sizeQtyMap[sz] > 0) {
        const fabricUse = pNum(product.sizeUsage?.fabric?.[sz]);
        if (product.fabric?.vendorName && fabricUse === 0) {
          missing.push(`${sz} 원단 사용량`);
        }
        (product.materials || []).forEach((mat, idx) => {
          const use = pNum(product.sizeUsage?.materials?.[`m_${idx}`]?.[sz]);
          if (mat.vendorName && use === 0) {
            missing.push(`${sz} ${mat.name || '부자재#' + (idx+1)} 사용량`);
          }
        });
      }
    });
    return missing;
  }, [sizeQtyMap, sizes, product]);

  const fabricNeeded = useMemo(() => {
    return sizes.reduce((s, sz) => {
      const qty = sizeQtyMap[sz] || 0;
      const use = pNum(product.sizeUsage?.fabric?.[sz]);
      return s + (qty * use);
    }, 0);
  }, [sizeQtyMap, sizes, product]);

  const fabricCost = fabricNeeded * (product.fabric?.price || 0);
  
  const materialsNeeded = useMemo(() => {
    return (product.materials || []).map((m, idx) => {
      const totalQty = sizes.reduce((s, sz) => {
        const qty = sizeQtyMap[sz] || 0;
        const use = pNum(product.sizeUsage?.materials?.[`m_${idx}`]?.[sz]);
        return s + (qty * use);
      }, 0);
      return {
        ...m,
        totalQty,
        totalCost: totalQty * (m.price || 0),
      };
    });
  }, [sizeQtyMap, sizes, product]);

  // 봉제 공임 (사이즈별 or 기본값)
  const sewingCost = useMemo(() => {
    const defaultSewing = product.sewing?.price || 0;
    return sizes.reduce((total, sz) => {
      const qty = sizeQtyMap[sz] || 0;
      const sizeSewing = pNum(product.sizeUsage?.sewing?.[sz]);
      const perUnit = sizeSewing > 0 ? sizeSewing : defaultSewing;
      return total + (qty * perUnit);
    }, 0);
  }, [sizeQtyMap, sizes, product]);

  // 소계 (원단 + 부자재 + 봉제 공임)
  const subtotal = fabricCost + materialsNeeded.reduce((s, m) => s + m.totalCost, 0) + sewingCost;

  // 로스 (사이즈별 가중 평균)
  const lossAmount = useMemo(() => {
    // 각 사이즈별로 비용과 로스율 계산
    let totalLoss = 0;
    sizes.forEach(sz => {
      const qty = sizeQtyMap[sz] || 0;
      if (qty === 0) return;
      
      const fUse = pNum(product.sizeUsage?.fabric?.[sz]);
      const fCost = fUse * (product.fabric?.price || 0) * qty;
      
      let mCost = 0;
      (product.materials || []).forEach((m, idx) => {
        const use = pNum(product.sizeUsage?.materials?.[`m_${idx}`]?.[sz]);
        mCost += use * (m.price || 0) * qty;
      });
      
      const sizeSewing = pNum(product.sizeUsage?.sewing?.[sz]);
      const sCost = (sizeSewing > 0 ? sizeSewing : (product.sewing?.price || 0)) * qty;
      
      const sizeSubtotal = fCost + mCost + sCost;
      const lossPercent = product.sizeUsage?.loss?.[sz] !== undefined
        ? pNum(product.sizeUsage.loss[sz])
        : 5;
      totalLoss += sizeSubtotal * (lossPercent / 100);
    });
    return totalLoss;
  }, [sizeQtyMap, sizes, product]);

  const totalCost = subtotal + lossAmount;

  // 발주번호 생성
  const generateOrderNo = (prefix) => {
    const now = new Date();
    const pad = (n) => String(n).padStart(2, '0');
    const dateStr = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}`;
    const seq = Math.floor(Math.random() * 900 + 100);
    return `EL-${dateStr}-${prefix}-${seq}`;
  };

  // 사업자정보 체크
  const hasCompanyInfo = companyInfo.name && (companyInfo.addr || companyInfo.phone);

  // 발주서 텍스트 생성
  const generateOrderText = (type) => {
    const now = new Date();
    const pad = (n) => String(n).padStart(2, '0');
    const dateStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
    const orderNo = generateOrderNo(type === 'fabric' ? 'F' : 'M');
    
    let toVendor, shipTo, itemDesc;
    
    if (type === 'fabric') {
      toVendor = {
        name: product.fabric?.vendorName || '',
        phone: product.fabric?.vendorPhone || '',
        addr: product.fabric?.vendorAddr || '',
        bizNo: product.fabric?.vendorBizNo || '',
      };
      shipTo = fabricShipTo;
      const colorStr = colors.map(c => `${product.elColors[c]}(${c})`).join(', ');
      itemDesc = `▪ 품목: ${product.name}
▪ 원단명: ${product.fabric?.name || '-'}
▪ 색상: ${colorStr}
▪ 수량: ${fabricNeeded.toFixed(2)} ${product.fabric?.unit || 'Y'}
▪ 단가: ₩${(product.fabric?.price || 0).toLocaleString()}/${product.fabric?.unit || 'Y'}
▪ 금액: ₩${Math.round(fabricCost).toLocaleString()}`;
    } else {
      // 부자재 (여러 개 통합)
      toVendor = null; // 부자재는 여러 거래처 가능 → 부자재별로 처리
      shipTo = materialShipTo;
      itemDesc = materialsNeeded.map(m => 
`▪ 부자재명: ${m.name}
  종류: ${m.kind || '-'}
  거래처: ${m.vendorName || '-'}
  수량: ${m.totalQty.toFixed(2)} ${m.unit}
  단가: ₩${(m.price || 0).toLocaleString()}/${m.unit}
  금액: ₩${Math.round(m.totalCost).toLocaleString()}`
      ).join('\n\n');
    }

    let text = `[${type === 'fabric' ? '원단' : '부자재'} 발주서]
발주번호: ${orderNo}

┌─ 발주처 ─────────────────┐
상호: ${companyInfo.name || '-'}
${companyInfo.representative ? '대표: ' + companyInfo.representative + '\n' : ''}주소: ${companyInfo.addr || '-'}
전화: ${companyInfo.phone || '-'}
사업자번호: ${companyInfo.bizNo || '-'}
└──────────────────────────┘

발주일: ${dateStr}
${dueDate ? '납기: ' + dueDate + '\n' : ''}`;

    if (type === 'fabric' && toVendor) {
      text += `
받는곳: ${toVendor.name}
  ${toVendor.addr ? '주소: ' + toVendor.addr : ''}
  ${toVendor.phone ? '전화: ' + toVendor.phone : ''}
`;
    }

    text += `
🔴━━━━━━━━━━━━━━━━━━━━━━━━🔴
  입고처 (작업장)
  상호: ${shipTo.name || '-'}
  주소: ${shipTo.addr || '-'}
  전화: ${shipTo.phone || '-'}
🔴━━━━━━━━━━━━━━━━━━━━━━━━🔴

${itemDesc}

─────────────────────────
총 주문 수량: ${totalQty}장
─────────────────────────

확인 부탁드립니다.
- ${companyInfo.name || '이엘컴퍼니'}
`;
    return { text, orderNo };
  };

  // 발송 방법
  const handleSendOrder = async (type, method) => {
    if (!hasCompanyInfo) {
      alert('⚠️ 먼저 사이드바의 [사업자정보]를 입력해주세요.');
      return;
    }

    const { text, orderNo } = generateOrderText(type);
    const subject = `[${companyInfo.name || '이엘컴퍼니'}] ${type === 'fabric' ? '원단' : '부자재'} 발주서 - ${orderNo}`;

    switch (method) {
      case 'copy':
        try {
          await navigator.clipboard.writeText(text);
          alert('📋 클립보드에 복사되었습니다!');
        } catch {
          alert('❌ 복사 실패. 브라우저 권한을 확인해주세요.');
        }
        break;
      case 'sms':
        window.location.href = `sms:?body=${encodeURIComponent(text)}`;
        break;
      case 'email':
        window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(text)}`;
        break;
      case 'share':
        if (navigator.share) {
          try {
            await navigator.share({ title: subject, text });
          } catch (err) {
            if (err.name !== 'AbortError') alert('공유 실패: ' + err.message);
          }
        } else {
          alert('이 브라우저는 공유 기능을 지원하지 않습니다. 복사를 이용해주세요.');
        }
        break;
      case 'pdf':
        // 간단한 PDF 출력 (새 창 + 인쇄)
        const cleanText = text.split('\u{1F534}').join('').split('\u2501').join('');
        const win = window.open('', '_blank');
        const pdfTitle = (type === 'fabric' ? '원단' : '부자재') + ' 발주서';
        const htmlParts = [
          '<!DOCTYPE html><html><head><meta charset="utf-8"><title>',
          subject,
          '</title><style>body{font-family:"맑은 고딕","Noto Sans KR",sans-serif;padding:40px;line-height:1.6;}',
          'pre{white-space:pre-wrap;font-family:inherit;font-size:13px;}',
          '.header{text-align:center;margin-bottom:30px;border-bottom:2px solid #333;padding-bottom:20px;}',
          '.header h1{margin:0;font-size:24px;}',
          '@media print{body{padding:20px;}}</style></head><body>',
          '<div class="header"><h1>', pdfTitle, '</h1><div>', orderNo, '</div></div>',
          '<pre>', cleanText.replace(/</g, '&lt;').replace(/>/g, '&gt;'), '</pre>',
          '<scr' + 'ipt>window.print();</scr' + 'ipt>',
          '</body></html>'
        ];
        win.document.write(htmlParts.join(''));
        win.document.close();
        break;
    }

    // 이력 저장
    const orders = storage.get('el_orders', []);
    orders.push({
      id: orderNo,
      orderNo,
      type, // fabric / material
      productId: product.id,
      productName: product.name,
      totalQty,
      totalCost: type === 'fabric' ? fabricCost : materialsNeeded.reduce((s, m) => s + m.totalCost, 0),
      quantities: { ...quantities },
      method,
      text,
      shipTo: type === 'fabric' ? fabricShipTo : materialShipTo,
      createdAt: Date.now(),
    });
    storage.set('el_orders', orders);
  };

  if (colors.length === 0 || sizes.length === 0) {
    return (
      <div className="modal-backdrop" onClick={onClose}>
        <div className="modal-body" onClick={e => e.stopPropagation()}>
          <div className="p-6 text-center">
            <div className="text-5xl mb-3">⚠️</div>
            <div className="text-lg font-semibold mb-2">신속주문 불가</div>
            <div className="text-sm text-gray-600 mb-4">
              이 상품은 색상 또는 사이즈가 등록되지 않았습니다.<br/>
              상품 수정에서 먼저 등록해주세요.
            </div>
            <button onClick={onClose} className="btn-primary">닫기</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-body" onClick={e => e.stopPropagation()} style={{maxWidth: '700px'}}>
        <div className="p-6">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-lg font-semibold">⚡ 신속주문 - {product.name}</h2>
            <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl">✕</button>
          </div>

          {!hasCompanyInfo && (
            <div className="bg-orange-50 border border-orange-200 rounded-lg p-3 mb-4 text-xs text-orange-800">
              ⚠️ 발주서 생성 전 사이드바의 <strong>[🏢 사업자정보]</strong>를 먼저 입력해주세요.
            </div>
          )}

          {/* 색상×사이즈 매트릭스 */}
          <div className="mb-4">
            <div className="text-xs font-semibold text-gray-700 mb-2">색상별 수량 입력</div>
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead>
                  <tr className="border-b">
                    <th className="text-left py-2 px-2 text-xs text-gray-500">색상</th>
                    {sizes.map(s => (
                      <th key={s} className="py-2 px-1 text-xs text-gray-500 w-16">{s}</th>

                </thead>
                <tbody>
                  {colors.map(c => (
                    <tr key={c} className="border-b border-gray-100">
                      <td className="py-2 px-2 text-xs">
                        <div className="font-medium">{product.elColors[c]}</div>
                        <div className="text-gray-400 text-[10px]">({c})</div>
                      </td>
                      {sizes.map(s => (
                        <td key={s} className="py-1 px-1">
                          <input type="number" min="0"
                            value={quantities[`${c}_${s}`] || ''}

                      ))}
                      <td className="py-2 px-2 text-xs font-semibold text-center">{colorTotals[c]}</td>
                    </tr>
                  ))}
                </tbody>
                <tfoot>
                  <tr className="bg-gray-50">
                    <td className="py-2 px-2 text-xs font-semibold">합계</td>
                    <td colSpan={sizes.length} className="text-right pr-3 text-xs"></td>
                    <td className="py-2 px-2 text-sm font-bold text-center">{totalQty}장</td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>

          {/* 납기 */}
          <div className="mb-4">
            <label className="text-xs font-medium text-gray-600 block mb-1">납기 (선택)</label>
            <input type="date" value={dueDate} onChange={e => setDueDate(e.target.value)}
              className="input-field max-w-xs" />
          </div>

          {/* 자동 계산 */}
          {totalQty > 0 && (
            <div className="bg-gray-50 rounded-xl p-4 mb-4">
              <div className="text-xs font-semibold text-gray-700 mb-2">📦 필요 자재 자동 계산</div>
              
              {missingUsage.length > 0 && (
                <div className="bg-orange-50 border border-orange-200 rounded-lg p-2 mb-3 text-xs">
                  <div className="font-semibold text-orange-800 mb-1">⚠️ 사용량 미입력 항목</div>
                  <div className="text-orange-700 text-[11px] space-y-0.5">
                    {missingUsage.slice(0, 5).map((m, i) => (
                      <div key={i}>• {m}</div>
                    ))}
                    {missingUsage.length > 5 && <div>• ... 외 {missingUsage.length - 5}개</div>}
                  </div>
                  <div className="text-[10px] text-orange-600 mt-1 pt-1 border-t border-orange-200">
                    상품마스터에서 사이즈별 사용량을 입력하면 정확히 계산됩니다.
                    <br />현재는 입력된 값만으로 계산 중 (0으로 누락됨)
                  </div>
                </div>
              )}
              
              <div className="space-y-2 text-xs">
                <div className="flex justify-between">
                  <span>🧵 원단 ({product.fabric?.name || '-'})</span>
                  <span className="font-semibold">{fabricNeeded.toFixed(2)} {product.fabric?.unit || 'Y'} · ₩{Math.round(fabricCost).toLocaleString()}</span>
                </div>
                {materialsNeeded.map((m, i) => (
                  <div key={i} className="flex justify-between">
                    <span>🔧 {m.name || '(이름없음)'}</span>
                    <span className="font-semibold">{m.totalQty.toFixed(2)} {m.unit} · ₩{Math.round(m.totalCost).toLocaleString()}</span>
                  </div>
                ))}
                <div className="flex justify-between">
                  <span>🏭 봉제 공임</span>
                  <span className="font-semibold">{totalQty}장 · ₩{Math.round(sewingCost).toLocaleString()}</span>
                </div>
                <div className="flex justify-between border-t pt-2 mt-2 text-gray-600">
                  <span>소계</span>
                  <span>₩{Math.round(subtotal).toLocaleString()}</span>
                </div>
                <div className="flex justify-between text-orange-600">
                  <span>🎯 로스 (사이즈별 가중)</span>
                  <span className="font-semibold">+₩{Math.round(lossAmount).toLocaleString()}</span>
                </div>
                <div className="flex justify-between border-t pt-2 mt-2">
                  <span className="font-semibold">💰 총 비용</span>
                  <span className="font-bold text-base">₩{Math.round(totalCost).toLocaleString()}</span>
                </div>
                <div className="text-[10px] text-gray-400 mt-1">
                  💡 발주서 수량은 로스 제외 순수량으로 발행됩니다
                </div>
              </div>
            </div>
          )}

          {/* 탭 */}
          <div className="flex gap-1 mb-3 border-b">
            <button onClick={() => setActiveTab('fabric')}
              className={`px-3 py-2 text-xs font-medium ${activeTab === 'fabric' ? 'text-gray-900 border-b-2 border-gray-900' : 'text-gray-500'}`}>
              📤 원단 발주서
            </button>
            <button onClick={() => setActiveTab('material')}
              className={`px-3 py-2 text-xs font-medium ${activeTab === 'material' ? 'text-gray-900 border-b-2 border-gray-900' : 'text-gray-500'}`}>
              📤 부자재 발주서
            </button>
            <button disabled
              className="px-3 py-2 text-xs font-medium text-gray-300 cursor-not-allowed">
              📋 작업지시서 (추후 제공)
            </button>
          </div>

          {/* 탭 내용 */}
          <div className="mb-4">
            {activeTab === 'fabric' && (
              <div className="space-y-3">
                <div className="text-xs text-gray-600">발주처: <strong>{product.fabric?.vendorName || '(미설정)'}</strong></div>
                <div className="bg-red-50 border-2 border-red-300 rounded-lg p-3">
                  <div className="text-xs font-semibold text-red-700 mb-2">🔴 입고처 정보 (수정 가능)</div>
                  <div className="space-y-1">
                    <input type="text" placeholder="상호" value={fabricShipTo.name}
                      onChange={e => setFabricShipTo({...fabricShipTo, name: e.target.value})}
                      className="input-field-sm" />
                    <input type="text" placeholder="주소" value={fabricShipTo.addr}
                      onChange={e => setFabricShipTo({...fabricShipTo, addr: e.target.value})}
                      className="input-field-sm" />
                    <input type="text" placeholder="전화번호" value={fabricShipTo.phone}
                      onChange={e => setFabricShipTo({...fabricShipTo, phone: e.target.value})}
                      className="input-field-sm" />
                  </div>
                </div>
              </div>
            )}
            {activeTab === 'material' && (
              <div className="space-y-3">
                <div className="text-xs text-gray-600">부자재 {materialsNeeded.length}개 포함</div>
                <div className="bg-red-50 border-2 border-red-300 rounded-lg p-3">
                  <div className="text-xs font-semibold text-red-700 mb-2">🔴 입고처 정보 (수정 가능)</div>
                  <div className="space-y-1">
                    <input type="text" placeholder="상호" value={materialShipTo.name}
                      onChange={e => setMaterialShipTo({...materialShipTo, name: e.target.value})}
                      className="input-field-sm" />
                    <input type="text" placeholder="주소" value={materialShipTo.addr}
                      onChange={e => setMaterialShipTo({...materialShipTo, addr: e.target.value})}
                      className="input-field-sm" />
                    <input type="text" placeholder="전화번호" value={materialShipTo.phone}
                      onChange={e => setMaterialShipTo({...materialShipTo, phone: e.target.value})}
                      className="input-field-sm" />
                  </div>
                </div>
              </div>
            )}
          </div>

          {/* 발송 버튼 5가지 */}
          <div className="border-t pt-4">
            <div className="text-xs font-semibold text-gray-700 mb-2">📤 발송 방법 선택</div>
            <div className="grid grid-cols-5 gap-2">
              <button onClick={() => handleSendOrder(activeTab, 'copy')}
                disabled={totalQty === 0}
                className="btn-secondary text-xs py-2 disabled:opacity-30">
                📋<br/>복사
              </button>
              <button onClick={() => handleSendOrder(activeTab, 'sms')}
                disabled={totalQty === 0}
                className="btn-secondary text-xs py-2 disabled:opacity-30">
                📱<br/>문자
              </button>
              <button onClick={() => handleSendOrder(activeTab, 'email')}
                disabled={totalQty === 0}
                className="btn-secondary text-xs py-2 disabled:opacity-30">
                📧<br/>메일
              </button>
              <button onClick={() => handleSendOrder(activeTab, 'share')}
                disabled={totalQty === 0}
                className="btn-secondary text-xs py-2 disabled:opacity-30">
                💬<br/>공유
              </button>
              <button onClick={() => handleSendOrder(activeTab, 'pdf')}
                disabled={totalQty === 0}
                className="btn-secondary text-xs py-2 disabled:opacity-30">
                📄<br/>PDF
              </button>
            </div>
          </div>

          <div className="flex gap-2 justify-end mt-5">
            <button onClick={onClose} className="btn-secondary">닫기</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// 상품 폼
// ═══════════════════════════════════════════════════════════
function ProductForm({ product, types, vendors, materialKinds, onSave, onCancel }) {
  const [form, setForm] = useState(() => {
    if (product) {
      const p = JSON.parse(JSON.stringify(product));
      // 마이그레이션: yoChuk → sizeUsage
      if (!p.sizeUsage) p.sizeUsage = {};
      // 원단 요척을 각 사이즈에 복사
      if (p.fabric?.yoChuk > 0 && p.sizes?.length > 0) {
        if (!p.sizeUsage.fabric) p.sizeUsage.fabric = {};
        p.sizes.forEach(sz => {
          if (p.sizeUsage.fabric[sz] === undefined) {
            p.sizeUsage.fabric[sz] = p.fabric.yoChuk;
          }
        });
      }
      // 부자재 qty → 각 사이즈에 복사
      if (!p.sizeUsage.materials) p.sizeUsage.materials = {};
      (p.materials || []).forEach((m, idx) => {
        if (m.qty > 0 && p.sizes?.length > 0) {
          const mKey = `m_${idx}`;
          if (!p.sizeUsage.materials[mKey]) p.sizeUsage.materials[mKey] = {};
          p.sizes.forEach(sz => {
            if (p.sizeUsage.materials[mKey][sz] === undefined) {
              p.sizeUsage.materials[mKey][sz] = m.qty;
            }
          });
        }
      });
      return p;
    }
    return {
      name: '', typeId: null, typeSelections: {}, image: '',
      sizes: [],
      fabric: {
        vendorName: '', vendorPhone: '', vendorAddr: '', vendorBizNo: '',
        name: '', colors: [], unit: 'Y', price: 0
      },
      materials: [],
      sewing: {
        vendorName: '', vendorPhone: '', vendorAddr: '', vendorBizNo: '', price: 0
      },
      processing: {
        dyeing: { use: false, vendorName: '', vendorPhone: '', vendorAddr: '', vendorBizNo: '', price: 0 },
        tenter: { use: false, vendorName: '', vendorPhone: '', vendorAddr: '', vendorBizNo: '', price: 0 },
        transfer: { use: false, vendorName: '', vendorPhone: '', vendorAddr: '', vendorBizNo: '', price: 0 },
        printing: { use: false, vendorName: '', vendorPhone: '', vendorAddr: '', vendorBizNo: '', price: 0 },
      },
      elColors: {},
      sizeUsage: {
        fabric: {},     // { S: 0.30, M: 0.35, L: 0.40 }
        materials: {},  // { m_0: { S: 1, M: 1, L: 1 }, m_1: { ... } }
      },
    };
  });

  const selectedType = types[form.typeId];
  const SIZE_OPTIONS = ['S', 'M', 'L', '55', '66', '77', 'FREE'];

  // 사이즈별 사용량 헬퍼 (소수점 입력 버그 수정: 문자열 저장)
  const setFabricUsage = (size, value) => {
    setForm(prev => ({
      ...prev,
      sizeUsage: {
        ...prev.sizeUsage,
        fabric: { ...(prev.sizeUsage?.fabric || {}), [size]: value }
      }
    }));
  };

  const setMaterialUsage = (materialIdx, size, value) => {
    const mKey = `m_${materialIdx}`;
    setForm(prev => ({
      ...prev,
      sizeUsage: {
        ...prev.sizeUsage,
        materials: {
          ...(prev.sizeUsage?.materials || {}),
          [mKey]: {
            ...((prev.sizeUsage?.materials || {})[mKey] || {}),
            [size]: value
          }
        }
      }
    }));
  };

  // 봉제 공임 (사이즈별)
  const setSewingUsage = (size, value) => {
    setForm(prev => ({
      ...prev,
      sizeUsage: {
        ...prev.sizeUsage,
        sewing: { ...(prev.sizeUsage?.sewing || {}), [size]: value }
      }
    }));
  };

  // 로스율 (사이즈별, %)
  const setLossUsage = (size, value) => {
    setForm(prev => ({
      ...prev,
      sizeUsage: {
        ...prev.sizeUsage,
        loss: { ...(prev.sizeUsage?.loss || {}), [size]: value }
      }
    }));
  };

  // 값 파싱 헬퍼 (문자열 → 숫자)
  const parseNum = (v) => {
    if (v === undefined || v === null || v === '') return 0;
    const n = parseFloat(v);
    return isNaN(n) ? 0 : n;
  };

  // 사이즈별 원가 계산
  const sizeCosts = useMemo(() => {
    const result = {};
    if (!form.sizes || form.sizes.length === 0) return result;
    
    form.sizes.forEach(sz => {
      const fabricUse = parseNum(form.sizeUsage?.fabric?.[sz]);
      const fabricPrice = form.fabric?.price || 0;
      
      let fabricCost = null;
      let materialsCost = null;
      const missing = [];
      
      if (fabricUse > 0 && fabricPrice > 0) {
        fabricCost = fabricUse * fabricPrice;
      } else if (form.fabric?.vendorName && fabricPrice > 0) {
        missing.push('원단사용량');
      }
      
      // 부자재 비용
      if ((form.materials || []).length > 0) {
        materialsCost = 0;
        (form.materials || []).forEach((m, idx) => {
          const use = parseNum(form.sizeUsage?.materials?.[`m_${idx}`]?.[sz]);
          if (use > 0 && m.price > 0) {
            materialsCost += use * m.price;
          } else if (m.vendorName && m.price > 0) {
            missing.push(`${m.name || '부자재#' + (idx+1)}사용량`);
          }
        });
      }
      
      // 봉제 공임 (사이즈별 + 카드 기본값)
      const sewingSizeVal = parseNum(form.sizeUsage?.sewing?.[sz]);
      const sewingDefault = form.sewing?.price || 0;
      const sewingCost = sewingSizeVal > 0 ? sewingSizeVal : sewingDefault;
      
      // 가공 (사이즈 무관 고정)
      let procCost = 0;
      Object.values(form.processing || {}).forEach(p => {
        if (p.use) procCost += p.price || 0;
      });
      
      // 소계 (원단 + 부자재 + 봉제 공임)
      const subtotal = (fabricCost !== null ? fabricCost : 0) 
                    + (materialsCost !== null ? materialsCost : 0) 
                    + sewingCost;
      
      // 로스 (%) - 기본 5
      const lossPercent = form.sizeUsage?.loss?.[sz] !== undefined
        ? parseNum(form.sizeUsage.loss[sz])
        : 5;
      const lossAmount = subtotal * (lossPercent / 100);
      
      const total = subtotal + lossAmount + procCost;
      
      result[sz] = {
        fabric: fabricCost,
        materials: materialsCost,
        sewing: sewingCost,
        processing: procCost,
        subtotal,
        lossPercent,
        lossAmount,
        total: missing.length === 0 ? total : null,
        missing,
      };
    });
    return result;
  }, [form]);

  // 원가 표시 상태 결정
  const costStatus = useMemo(() => {
    if (!form.sizes || form.sizes.length === 0) {
      return { kind: 'noSize' };
    }
    const hasFabricVendor = form.fabric?.vendorName;
    const hasFabricPrice = form.fabric?.price > 0;
    if (!hasFabricVendor || !hasFabricPrice) {
      return { kind: 'noFabricInfo' };
    }
    
    const allComplete = form.sizes.every(sz => sizeCosts[sz]?.total !== null);
    if (allComplete) return { kind: 'complete' };
    
    const someComplete = form.sizes.some(sz => sizeCosts[sz]?.total !== null);
    if (someComplete) return { kind: 'partial' };
    
    return { kind: 'empty' };
  }, [form.sizes, form.fabric, sizeCosts]);

  // 이미지 업로드
  const handleImageUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setForm(prev => ({ ...prev, image: ev.target.result }));
    reader.readAsDataURL(file);
  };

  // ─── 원단 관련 ───
  const setFabricField = (field, val) => setForm(prev => ({ ...prev, fabric: { ...prev.fabric, [field]: val } }));
  
  const handleFabricVendorSelect = (v) => {
    setForm(prev => ({ ...prev, fabric: {
      ...prev.fabric,
      vendorName: v.name,
      vendorPhone: v.phone || '',
      vendorAddr: v.addr || '',
      vendorBizNo: v.bizNo || '',
      name: v.itemName || prev.fabric.name,
      price: v.itemPrice || prev.fabric.price,
      unit: v.itemUnit || prev.fabric.unit || 'Y',
    } }));
  };

  const addFabricColor = () => {
    setForm(prev => ({ ...prev, fabric: { ...prev.fabric, colors: [...(prev.fabric.colors || []), ''] } }));
  };
  const updateFabricColor = (idx, val) => {
    setForm(prev => ({
      ...prev,
      fabric: { ...prev.fabric, colors: prev.fabric.colors.map((c, i) => i === idx ? val : c) }
    }));
  };
  const removeFabricColor = (idx) => {
    const removed = form.fabric.colors[idx];
    setForm(prev => {
      const newColors = prev.fabric.colors.filter((_, i) => i !== idx);
      const newElColors = { ...prev.elColors };
      if (removed) delete newElColors[removed];
      return { ...prev, fabric: { ...prev.fabric, colors: newColors }, elColors: newElColors };
    });
  };

  // ─── 부자재 관련 ───
  const addMaterial = () => setForm(prev => ({
    ...prev,
    materials: [...prev.materials, {
      vendorName: '', vendorPhone: '', vendorAddr: '', vendorBizNo: '',
      name: '', kind: '', unit: 'ea', price: 0, qty: 1
    }]
  }));

  const updateMaterial = (idx, field, val) => setForm(prev => ({
    ...prev,
    materials: prev.materials.map((m, i) => i === idx ? { ...m, [field]: val } : m)
  }));

  const handleMaterialVendorSelect = (idx, v) => {
    updateMaterial(idx, 'vendorName', v.name);
    updateMaterial(idx, 'vendorPhone', v.phone || '');
    updateMaterial(idx, 'vendorAddr', v.addr || '');
    updateMaterial(idx, 'vendorBizNo', v.bizNo || '');
    if (v.itemName) {
      updateMaterial(idx, 'name', v.itemName);
      updateMaterial(idx, 'price', v.itemPrice || 0);
      updateMaterial(idx, 'unit', v.itemUnit || 'ea');
    }
  };

  const removeMaterial = (idx) => setForm(prev => ({ ...prev, materials: prev.materials.filter((_, i) => i !== idx) }));

  // ─── 봉제 관련 ───
  const setSewingField = (field, val) => setForm(prev => ({ ...prev, sewing: { ...prev.sewing, [field]: val } }));
  
  const handleSewingVendorSelect = (v) => {
    setForm(prev => ({ ...prev, sewing: {
      ...prev.sewing,
      vendorName: v.name,
      vendorPhone: v.phone || '',
      vendorAddr: v.addr || '',
      vendorBizNo: v.bizNo || '',
      price: v.itemPrice || prev.sewing.price,
    } }));
  };

  // ─── 가공 관련 ───
  const updateProc = (key, field, val) => setForm(prev => ({
    ...prev,
    processing: { ...prev.processing, [key]: { ...prev.processing[key], [field]: val } }
  }));

  const handleProcVendorSelect = (key, v) => {
    setForm(prev => ({
      ...prev,
      processing: { ...prev.processing, [key]: {
        ...prev.processing[key],
        vendorName: v.name,
        vendorPhone: v.phone || '',
        vendorAddr: v.addr || '',
        vendorBizNo: v.bizNo || '',
        price: v.itemPrice || prev.processing[key].price,
      } }
    }));
  };

  // ─── 사이즈 ───
  const toggleSize = (s) => setForm(prev => ({
    ...prev, sizes: prev.sizes.includes(s) ? prev.sizes.filter(x => x !== s) : [...prev.sizes, s]
  }));

  // ─── 이엘 컬러 ───
  const setElColor = (originalColor, elColor) => {
    setForm(prev => ({ ...prev, elColors: { ...prev.elColors, [originalColor]: elColor } }));
  };

  // 자동완성용 vendor+item 조합 생성
  const buildVendorItemList = (category) => {
    const list = [];
    vendors.filter(v => v.category === category).forEach(v => {
      if (Array.isArray(v.items) && v.items.length > 0) {
        v.items.forEach(item => {
          list.push({
            ...v,
            itemName: item.name,
            itemPrice: item.price,
            itemUnit: item.unit,
            _key: v.id + '_' + item.id,
          });
        });
      } else {
        // items가 없으면 vendor 정보만
        list.push({ ...v, itemName: '', itemPrice: 0, itemUnit: '', _key: v.id });
      }
    });
    return list;
  };

  const fabricVendors = useMemo(() => buildVendorItemList('fabric'), [vendors]);
  const materialVendors = useMemo(() => buildVendorItemList('material'), [vendors]);
  const sewingVendors = useMemo(() => buildVendorItemList('sewing'), [vendors]);
  const procVendors = {
    dyeing: useMemo(() => buildVendorItemList('dyeing'), [vendors]),
    tenter: useMemo(() => buildVendorItemList('tenter'), [vendors]),
    transfer: useMemo(() => buildVendorItemList('transfer'), [vendors]),
    printing: useMemo(() => buildVendorItemList('printing'), [vendors]),
  };

              </div>

          <div className="overflow-x-auto">

              <thead>
                <tr className="border-b-2 border-gray-200">

                    </td>
                    {form.sizes.map(sz => (
                      <td key={sz} className="py-1 px-1">
                        <input type="number" step="0.01" min="0"
                          value={form.sizeUsage?.fabric?.[sz] ?? ''}
                          onChange={e => setFabricUsage(sz, e.target.value)}
                          className="input-field-sm text-center"
                          placeholder="0" />
                      </td>
                    ))}
                    <td className="py-2 px-2 text-xs text-gray-500 text-center">{form.fabric.unit || 'Y'}</td>
                  </tr>
                )}

                {/* 부자재 */}
                {(form.materials || []).map((m, idx) => (
                  <tr key={idx} className="border-b border-gray-100">
                    <td className="py-2 px-3">
                      <div className="text-xs font-medium">🔧 {m.name || `부자재 #${idx+1}`}</div>
                      <div className="text-[10px] text-gray-400">{m.vendorName || '-'}</div>
                    </td>
                    {form.sizes.map(sz => (
                      <td key={sz} className="py-1 px-1">
                        <input type="number" step="0.01" min="0"
                          value={form.sizeUsage?.materials?.[`m_${idx}`]?.[sz] ?? ''}
                          onChange={e => setMaterialUsage(idx, sz, e.target.value)}
                          className="input-field-sm text-center"
                          placeholder="0" />
                      </td>
                    ))}
                    <td className="py-2 px-2 text-xs text-gray-500 text-center">{m.unit || 'ea'}</td>
                  </tr>
                ))}

                {/* 봉제 공임 */}
                {form.sewing?.vendorName && (
                  <tr className="border-b-2 border-gray-200 bg-gray-50">
                    <td className="py-2 px-3">
                      <div className="text-xs font-medium">🏭 봉제 공임</div>
                      <div className="text-[10px] text-gray-400">{form.sewing.vendorName}</div>
                    </td>
                    {form.sizes.map(sz => (
                      <td key={sz} className="py-1 px-1">
                        <input type="number" step="1" min="0"
                          value={form.sizeUsage?.sewing?.[sz] ?? ''}

                    ))}

                  </tr>
                )}

                {/* 로스율 */}
                <tr className="bg-orange-50">
                  <td className="py-2 px-3">

                    <td colSpan={form.sizes.length + 2} className="py-6 text-center text-xs text-gray-400">

            </table>

        <button onClick={() => onSave(form)} disabled={!canSave} className="btn-primary">

      {showQuickOrder && isExistingProduct && (
        <QuickOrderModal product={form} types={types} onClose={() => setShowQuickOrder(false)} />

    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// 상품 리스트
// ═══════════════════════════════════════════════════════════
function ProductList({ products, types, onNew, onEdit, onDelete, onOpenTypeManager }) {
  const [search, setSearch] = useState('');
  const [filterType, setFilterType] = useState('all');
  const [cardSize, setCardSize] = useState('large');
  const [hoveredId, setHoveredId] = useState(null);

  const filtered = useMemo(() => {
    return products.filter(p => {
      if (filterType !== 'all' && p.typeId !== filterType) return false;
      if (search && !p.name.includes(search)) return false;
      return true;
    });
  }, [products, search, filterType]);

  const getTypeSummary = (product) => {
    const t = types[product.typeId];
    if (!t) return '';
    const parts = t.flow.map(key => {
      const opts = t.options[key] || [];
      const sel = opts.find(o => o.id === product.typeSelections?.[key]);
      return sel?.label;
    }).filter(Boolean);
    return parts.join(' / ');
  };

  const calculateCost = (p) => {
    // 모든 사이즈가 입력되어 있을 때만 평균 원가 반환
    if (!p.sizes || p.sizes.length === 0) return null;
    
    const pNum = (v) => {
      if (v === undefined || v === null || v === '') return 0;
      const n = parseFloat(v);
      return isNaN(n) ? 0 : n;
    };
    
    const costs = [];
    let anyMissing = false;
    
    p.sizes.forEach(sz => {
      let c = 0;
      let missing = false;
      
      // 원단
      const fabricUse = pNum(p.sizeUsage?.fabric?.[sz]);
      if (p.fabric?.vendorName && p.fabric?.price > 0) {
        if (fabricUse > 0) c += fabricUse * p.fabric.price;
        else missing = true;
      }
      
      // 부자재
      (p.materials || []).forEach((m, idx) => {
        if (m.vendorName && m.price > 0) {
          const use = pNum(p.sizeUsage?.materials?.[`m_${idx}`]?.[sz]);
          if (use > 0) c += use * m.price;
          else missing = true;
        }
      });
      
      // 봉제 (사이즈별 또는 기본값)
      const sizeSewing = pNum(p.sizeUsage?.sewing?.[sz]);
      c += sizeSewing > 0 ? sizeSewing : (p.sewing?.price || 0);
      
      // 로스 (소계 × %)
      const lossPercent = p.sizeUsage?.loss?.[sz] !== undefined 
        ? pNum(p.sizeUsage.loss[sz]) 
        : 5;
      c = c * (1 + lossPercent / 100);
      
      // 가공 (사이즈 무관, 로스 별도)
      Object.values(p.processing || {}).forEach(proc => { 
        if (proc.use) c += proc.price || 0; 
      });
      
      if (missing) anyMissing = true;
      costs.push(c);
    });
    
    if (anyMissing || costs.length === 0) return null;
    return Math.round(costs.reduce((s, c) => s + c, 0) / costs.length);
  };

  return (
    <div className="space-y-6">
      <div className="main-card p-5">
        <div className="flex flex-wrap items-center gap-3">
          <button className="btn-primary" onClick={onNew}>➕ 새 상품 등록</button>
          <button className="btn-secondary" onClick={onOpenTypeManager}>⚙ 타입 관리</button>
          <div className="flex-1"></div>
          <input type="text" placeholder="🔍 상품명 검색..." value={search}
            onChange={e => setSearch(e.target.value)} className="input-field max-w-xs" />
          <select value={filterType} onChange={e => setFilterType(e.target.value)} className="input-field max-w-xs">
            <option value="all">전체 타입</option>
            {Object.values(types).map(t => <option key={t.id} value={t.id}>{t.label}</option>)}
          </select>
          <div className="flex gap-1 text-xs">
            <button onClick={() => setCardSize('large')}
              className={`px-2 py-1 rounded ${cardSize === 'large' ? 'bg-gray-900 text-white' : 'bg-white border'}`}>크게</button>
            <button onClick={() => setCardSize('small')}
              className={`px-2 py-1 rounded ${cardSize === 'small' ? 'bg-gray-900 text-white' : 'bg-white border'}`}>작게</button>
            <button onClick={() => setCardSize('grid')}
              className={`px-2 py-1 rounded ${cardSize === 'grid' ? 'bg-gray-900 text-white' : 'bg-white border'}`}>📱 전체보기</button>
          </div>
        </div>
      </div>

      {filtered.length === 0 ? (
        <div className="placeholder-box">
          <div className="text-5xl mb-4 opacity-40">📦</div>
          <div className="text-lg font-medium text-gray-700 mb-2">등록된 상품이 없습니다</div>
          <div className="text-sm text-gray-500">"새 상품 등록" 버튼을 눌러 시작하세요</div>
        </div>
      ) : cardSize === 'grid' ? (
        // 📱 전체보기 (앱 아이콘 스타일)
        <div className="main-card p-6">
          <div className="flex flex-wrap gap-4">
            {filtered.map(p => (
              <div key={p.id}
                className="relative cursor-pointer group"
                style={{ width: '120px' }}
                onClick={() => onEdit(p)}
                onMouseEnter={() => setHoveredId(p.id)}
                onMouseLeave={() => setHoveredId(null)}>
                <div className="bg-gray-50 rounded-2xl aspect-square flex items-center justify-center overflow-hidden transition-all group-hover:shadow-md group-hover:scale-105">
                  {p.image ? (
                    <img src={p.image} alt={p.name} className="w-full h-full object-contain" />
                  ) : (
                    <div className="opacity-60">
                      <Silhouette typeId={p.typeId} size={80} />
                    </div>
                  )}
                </div>
                <div className="text-center mt-2 text-xs font-medium text-gray-800 truncate px-1">{p.name}</div>
                {/* 호버 시 부가 정보 */}
                {hoveredId === p.id && (
                  <div className="absolute top-full left-1/2 -translate-x-1/2 mt-1 bg-gray-900 text-white rounded-lg px-3 py-2 text-xs whitespace-nowrap z-20 shadow-lg pointer-events-none">
                    <div className="font-semibold">{p.name}</div>
                    <div className="text-gray-300">{types[p.typeId]?.label || '?'}{getTypeSummary(p) && ' · ' + getTypeSummary(p)}</div>
                    {(() => {
                      const cost = calculateCost(p);
                      return cost !== null 
                        ? <div className="text-gray-300">평균 ₩{cost.toLocaleString()}</div>
                        : <div className="text-orange-300">사용량 미입력</div>;
                    })()}
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      ) : (
        <div className={`grid gap-4 ${cardSize === 'large' ? 'grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4' : 'grid-cols-2 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8'}`}>
          {filtered.map(p => (
            <div key={p.id} className="product-card" onClick={() => onEdit(p)}>
              <div className="bg-gray-50 rounded-lg mb-3 flex items-center justify-center aspect-square">
                {p.image ? (
                  <img src={p.image} alt={p.name} className="w-full h-full object-contain rounded-lg" />
                ) : (
                  <div className="opacity-60">
                    <Silhouette typeId={p.typeId} size={cardSize === 'large' ? 120 : 60} />
                  </div>
                )}
              </div>
              <div className="space-y-1">
                <div className={`font-semibold text-gray-900 truncate ${cardSize === 'small' ? 'text-xs' : 'text-sm'}`}>{p.name}</div>
                <div className="flex items-center gap-1 flex-wrap">
                  <span className="badge">{types[p.typeId]?.label || '?'}</span>
                  {cardSize === 'large' && getTypeSummary(p) && (
                    <span className="text-xs text-gray-500">{getTypeSummary(p)}</span>
                  )}
                </div>
                {cardSize === 'large' && (
                  <>
                    <div className="text-xs text-gray-500">
                      색상 {Object.keys(p.elColors || {}).length || p.fabric?.colors?.length || 0} · 사이즈 {p.sizes?.length || 0}
                    </div>
                    {(() => {
                      const cost = calculateCost(p);
                      return cost !== null 
                        ? <div className="text-sm font-semibold text-gray-900">평균 ₩{cost.toLocaleString()}</div>
                        : <div className="text-xs text-orange-600">⚠️ 사용량 미입력</div>;
                    })()}
                  </>
                )}
              </div>
              {cardSize === 'large' && (
                <div className="flex gap-1 mt-3 pt-3 border-t border-gray-100">
                  <button onClick={(e) => { e.stopPropagation(); onEdit(p); }}
                    className="flex-1 text-xs py-1.5 bg-gray-50 hover:bg-gray-100 rounded">수정</button>
                  <button onClick={(e) => { e.stopPropagation(); onDelete(p.id); }}
                    className="flex-1 text-xs py-1.5 bg-gray-50 hover:bg-red-50 hover:text-red-600 rounded">삭제</button>
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// 타입 관리
// ═══════════════════════════════════════════════════════════
function NewFlowAdder({ onAdd }) {
  const [val, setVal] = useState('');
  return (
    <div className="flex gap-1">
      <input type="text" value={val} onChange={e => setVal(e.target.value)}
        onKeyPress={e => e.key === 'Enter' && (onAdd(val), setVal(''))}
        placeholder="+ 선택 단계 추가 (예: sleeve)" className="input-field text-xs max-w-xs" />
      <button onClick={() => { onAdd(val); setVal(''); }} className="btn-secondary text-xs">추가</button>
    </div>
  );
}

function TypeManager({ types, onSave, onClose }) {
  const [localTypes, setLocalTypes] = useState(JSON.parse(JSON.stringify(types)));
  const [newTypeName, setNewTypeName] = useState('');
  const [newOptInputs, setNewOptInputs] = useState({});

  const addNewType = () => {
    if (!newTypeName.trim()) return;
    const id = 'custom-' + Date.now();
    setLocalTypes(prev => ({ ...prev, [id]: { id, label: newTypeName.trim(), flow: [], options: {} } }));
    setNewTypeName('');
  };

  const removeType = (id) => {
    if (confirm(`"${localTypes[id]?.label}" 타입을 삭제하시겠습니까?`)) {
      setLocalTypes(prev => { const copy = { ...prev }; delete copy[id]; return copy; });
    }
  };

  const updateTypeLabel = (id, label) => setLocalTypes(prev => ({ ...prev, [id]: { ...prev[id], label } }));

  const addFlowKey = (typeId, key) => {
    if (!key) return;
    setLocalTypes(prev => ({
      ...prev, [typeId]: {
        ...prev[typeId], flow: [...(prev[typeId].flow || []), key],
        options: { ...(prev[typeId].options || {}), [key]: [] }
      }
    }));
  };

  const removeFlowKey = (typeId, key) => {
    setLocalTypes(prev => {
      const t = { ...prev[typeId] };
      t.flow = t.flow.filter(k => k !== key);
      const opts = { ...t.options }; delete opts[key]; t.options = opts;
      return { ...prev, [typeId]: t };
    });
  };

  const addOption = (typeId, flowKey, optInputKey) => {
    const txt = (newOptInputs[optInputKey] || '').trim();
    if (!txt) return;
    const optId = 'opt-' + Date.now();
    setLocalTypes(prev => ({
      ...prev, [typeId]: {
        ...prev[typeId],
        options: {
          ...prev[typeId].options,
          [flowKey]: [...(prev[typeId].options[flowKey] || []), { id: optId, label: txt }]
        }
      }
    }));
    setNewOptInputs(prev => ({ ...prev, [optInputKey]: '' }));
  };

  const removeOption = (typeId, flowKey, optId) => {
    setLocalTypes(prev => ({
      ...prev, [typeId]: {
        ...prev[typeId],
        options: {
          ...prev[typeId].options,
          [flowKey]: prev[typeId].options[flowKey].filter(o => o.id !== optId)
        }
      }
    }));
  };

  const handleSave = () => { onSave(localTypes); onClose(); };

  const handleReset = () => {
    if (confirm('기본 타입으로 초기화하시겠습니까? 사용자 추가 타입은 삭제됩니다.')) {
      setLocalTypes(JSON.parse(JSON.stringify(DEFAULT_TYPES)));
    }
  };

  return (
    <div className="space-y-6">
      <div className="main-card p-5 flex items-center gap-3">
        <button onClick={onClose} className="btn-secondary">← 돌아가기</button>
        <div className="flex-1"></div>
        <button onClick={handleReset} className="btn-secondary text-xs">🔄 기본값 복원</button>
        <button onClick={handleSave} className="btn-primary">💾 저장</button>
      </div>

      <div className="main-card p-5">
        <div className="text-sm font-semibold mb-3">➕ 새 대분류 추가</div>
        <div className="flex gap-2">
          <input type="text" value={newTypeName} onChange={e => setNewTypeName(e.target.value)}
            onKeyPress={e => e.key === 'Enter' && addNewType()}
            placeholder="예: 세트, 언더웨어..." className="input-field max-w-xs" />
          <button onClick={addNewType} className="btn-primary">추가</button>
        </div>
      </div>

      <div className="space-y-3">
        {Object.values(localTypes).map(t => (
          <div key={t.id} className="main-card p-5">
            <div className="flex items-center gap-3 mb-3">
              <input type="text" value={t.label} onChange={e => updateTypeLabel(t.id, e.target.value)}
                className="input-field max-w-xs font-semibold" />
              <button onClick={() => removeType(t.id)}
                className="text-xs text-red-500 hover:text-red-700">🗑 타입 삭제</button>
            </div>

            <div className="pl-4 space-y-3 border-l-2 border-gray-100">
              {t.flow.map(flowKey => (
                <div key={flowKey} className="bg-gray-50 rounded-lg p-3">
                  <div className="flex items-center gap-2 mb-2">
                    <span className="text-xs font-semibold">▸ {flowKey}</span>
                    <button onClick={() => removeFlowKey(t.id, flowKey)}
                      className="text-xs text-red-400">✕ 제거</button>
                  </div>
                  <div className="flex flex-wrap gap-2 mb-2">
                    {(t.options[flowKey] || []).map(opt => (
                      <span key={opt.id} className="badge flex items-center gap-1">
                        {opt.label}
                        <button onClick={() => removeOption(t.id, flowKey, opt.id)}
                          className="text-gray-400 hover:text-red-500">✕</button>
                      </span>
                    ))}
                  </div>
                  <div className="flex gap-1">
                    <input type="text" value={newOptInputs[t.id + '_' + flowKey] || ''}
                      onChange={e => setNewOptInputs(prev => ({ ...prev, [t.id + '_' + flowKey]: e.target.value }))}
                      onKeyPress={e => e.key === 'Enter' && addOption(t.id, flowKey, t.id + '_' + flowKey)}
                      placeholder="옵션 이름" className="input-field text-xs" />
                    <button onClick={() => addOption(t.id, flowKey, t.id + '_' + flowKey)}
                      className="btn-secondary text-xs">+</button>
                  </div>
                </div>
              ))}
              <NewFlowAdder onAdd={(key) => addFlowKey(t.id, key)} />
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// 거래처 데이터 마이그레이션 (v06 → v07)
// ═══════════════════════════════════════════════════════════
function migrateVendors(oldVendors) {
  return oldVendors.map(v => {
    // 이미 마이그레이션된 경우
    if (Array.isArray(v.items)) return v;
    
    const items = [];
    if (v.fabricName) {
      items.push({
        id: 'item-' + Math.random().toString(36).slice(2, 9),
        name: v.fabricName,
        price: 0,
        unit: 'Y',
        source: 'product_linked',
        linkedProductIds: v.linkedProducts || [],
      });
    }
    if (v.materialKind && !v.fabricName) {
      items.push({
        id: 'item-' + Math.random().toString(36).slice(2, 9),
        name: v.materialKind,
        price: 0,
        unit: 'ea',
        source: 'product_linked',
        linkedProductIds: v.linkedProducts || [],
      });
    }
    
    return {
      ...v,
      items,
    };
  });
}

// ═══════════════════════════════════════════════════════════
// 거래처 자동 취합 로직 (items 구조)
// ═══════════════════════════════════════════════════════════
function collectVendorsFromProduct(product, existingVendors) {
  const vendors = existingVendors.map(v => ({ 
    ...v, 
    items: Array.isArray(v.items) ? [...v.items] : [] 
  }));
  const newVendorsList = [];

  const upsertVendor = (category, vendorData, itemData) => {
    if (!vendorData.name || !vendorData.name.trim()) return;
    
    let vendor = vendors.find(v => v.category === category && v.name === vendorData.name);
    
    if (!vendor) {
      vendor = {
        id: 'v-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7),
        category,
        name: vendorData.name,
        phone: vendorData.phone || '',
        addr: vendorData.addr || '',
        bizNo: vendorData.bizNo || '',
        items: [],
        createdAt: Date.now(),
      };
      vendors.push(vendor);
      newVendorsList.push(vendor);
    } else {
      // 정보 업데이트 (빈 값이 아니면)
      if (vendorData.phone) vendor.phone = vendorData.phone;
      if (vendorData.addr) vendor.addr = vendorData.addr;
      if (vendorData.bizNo) vendor.bizNo = vendorData.bizNo;
    }
    
    if (itemData && itemData.name && itemData.name.trim()) {
      // 기존 item 찾기
      let item = vendor.items.find(i => i.name === itemData.name);
      if (!item) {
        item = {
          id: 'item-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7),
          name: itemData.name,
          price: itemData.price || 0,
          unit: itemData.unit || 'ea',
          source: 'product_linked',
          linkedProductIds: [product.id],
        };
        vendor.items.push(item);
      } else {
        // 기존 item 업데이트
        if (itemData.price) item.price = itemData.price;
        if (itemData.unit) item.unit = itemData.unit;
        item.source = 'product_linked';
        item.linkedProductIds = [...new Set([...(item.linkedProductIds || []), product.id])];
      }
    }
  };

  // 원단
  if (product.fabric?.vendorName) {
    upsertVendor('fabric',
      { name: product.fabric.vendorName, phone: product.fabric.vendorPhone, addr: product.fabric.vendorAddr, bizNo: product.fabric.vendorBizNo },
      { name: product.fabric.name, price: product.fabric.price, unit: product.fabric.unit || 'Y' }
    );
  }

  // 부자재
  (product.materials || []).forEach(m => {
    if (m.vendorName) {
      upsertVendor('material',
        { name: m.vendorName, phone: m.vendorPhone, addr: m.vendorAddr, bizNo: m.vendorBizNo },
        { name: m.name, price: m.price, unit: m.unit || 'ea' }
      );
    }
  });

  // 봉제 (상품명으로 item 저장)
  if (product.sewing?.vendorName) {
    upsertVendor('sewing',
      { name: product.sewing.vendorName, phone: product.sewing.vendorPhone, addr: product.sewing.vendorAddr, bizNo: product.sewing.vendorBizNo },
      { name: product.name, price: product.sewing.price, unit: '장' }
    );
  }

  // 가공 (상품명으로 item 저장)
  const PROC_UNITS = { dyeing: 'kg', tenter: 'Y', transfer: '판', printing: '판' };
  Object.entries(product.processing || {}).forEach(([key, p]) => {
    if (p.use && p.vendorName) {
      upsertVendor(key,
        { name: p.vendorName, phone: p.vendorPhone, addr: p.vendorAddr, bizNo: p.vendorBizNo },
        { name: product.name, price: p.price, unit: PROC_UNITS[key] || 'unit' }
      );
    }
  });

  return { vendors, newVendors: newVendorsList };
}

function ProductsMaster() {
  const [view, setView] = useState('list');
  const [products, setProducts] = useState(() => {
    const loaded = storage.get('el_products', []);
    // yds → Y 마이그레이션
    return loaded.map(p => {
      const copy = JSON.parse(JSON.stringify(p));
      if (copy.fabric?.unit === 'yds') copy.fabric.unit = 'Y';
      (copy.materials || []).forEach(m => {
        if (m.unit === 'yds') m.unit = 'Y';
      });
      return copy;
    });
  });
  const [types, setTypes] = useState(() => storage.get('el_types', DEFAULT_TYPES));
  const [vendors, setVendors] = useState(() => {
    const loaded = storage.get('el_vendors', []);
    return migrateVendors(loaded);
  });
  const [materialKinds] = useState(DEFAULT_MATERIAL_KINDS);
  const [editingProduct, setEditingProduct] = useState(null);
  const [toastMessages, setToastMessages] = useState([]);

  // 샘플 데이터
  useEffect(() => {
    const hasSample = storage.get('el_sample_added_v4', false);
    if (!hasSample && products.length === 0) {
      const sample = {
        id: 'sample-1', name: '글램튜브롱&숏', typeId: 'tshirt',
        typeSelections: { sleeve: 'sleeveless', neck: 'round' },
        image: '', sizes: ['S', 'M', 'L'],
        fabric: {
          vendorName: '충남', vendorPhone: '02-123-4567',
          vendorAddr: 'A동 301호', vendorBizNo: '123-45-67890',
          name: '소프트핏',
          colors: ['Navy', 'White'],
          unit: 'Y', price: 4500
        },
        materials: [
          {
            vendorName: 'OO부자재', vendorPhone: '', vendorAddr: '', vendorBizNo: '',
            name: '사이즈라벨', kind: '사이즈라벨', unit: 'ea', price: 300
          },
        ],
        sewing: {
          vendorName: 'OO봉제', vendorPhone: '', vendorAddr: '', vendorBizNo: '',
          price: 3000
        },
        processing: {
          dyeing: { use: false, vendorName: '', vendorPhone: '', vendorAddr: '', vendorBizNo: '', price: 0 },
          tenter: { use: false, vendorName: '', vendorPhone: '', vendorAddr: '', vendorBizNo: '', price: 0 },
          transfer: { use: false, vendorName: '', vendorPhone: '', vendorAddr: '', vendorBizNo: '', price: 0 },
          printing: { use: false, vendorName: '', vendorPhone: '', vendorAddr: '', vendorBizNo: '', price: 0 },
        },
        elColors: { 'Navy': '네이비', 'White': '화이트' },
        sizeUsage: {
          fabric: { S: 0.30, M: 0.35, L: 0.40 },
          materials: { m_0: { S: 1, M: 1, L: 1 } },
        },
        createdAt: Date.now(),
      };
      setProducts([sample]);
      // 샘플 거래처도 자동 취합
      const { vendors: v } = collectVendorsFromProduct(sample, []);
      setVendors(v);
      storage.set('el_products', [sample]);
      storage.set('el_vendors', v);
      storage.set('el_sample_added_v4', true);
    }
  }, []);

  useEffect(() => { storage.set('el_products', products); }, [products]);
  useEffect(() => { storage.set('el_types', types); }, [types]);
  useEffect(() => { storage.set('el_vendors', vendors); }, [vendors]);

  const handleSave = (product) => {
    if (!product.id) {
      product.id = 'p-' + Date.now();
      product.createdAt = Date.now();
    }
    
    // 제품 저장
    setProducts(prev => {
      const exists = prev.find(p => p.id === product.id);
      return exists ? prev.map(p => p.id === product.id ? product : p) : [...prev, product];
    });
    
    // 거래처 자동 취합
    const { vendors: newVendorList, newVendors: added } = collectVendorsFromProduct(product, vendors);
    setVendors(newVendorList);
    
    // 토스트 메시지
    const msgs = [`상품 "${product.name}" 저장 완료`];
    if (added.length > 0) {
      const categoryLabels = {
        fabric: '원단', material: '부자재', sewing: '봉제',
        dyeing: '염색', tenter: '텐타', transfer: '전사', printing: '나염'
      };
      added.forEach(v => msgs.push(`${categoryLabels[v.category] || v.category} 거래처 등록: ${v.name}`));
    }
    setToastMessages(msgs);
    
    setView('list');
    setEditingProduct(null);
  };

  const handleDelete = (id) => {
    if (confirm('이 상품을 삭제하시겠습니까?')) {
      setProducts(prev => prev.filter(p => p.id !== id));
    }
  };

  const handleEdit = (product) => { setEditingProduct(product); setView('form'); };
  const handleNew = () => { setEditingProduct(null); setView('form'); };

  if (view === 'form') {
    return <>
      <ProductForm product={editingProduct} types={types} vendors={vendors} materialKinds={materialKinds}
        onSave={handleSave} onCancel={() => { setView('list'); setEditingProduct(null); }} />
      <Toast messages={toastMessages} onClose={() => setToastMessages([])} />
    </>;
  }

  if (view === 'typeManager') {
    return <TypeManager types={types} onSave={setTypes} onClose={() => setView('list')} />;
  }

  return <>
    <ProductList products={products} types={types}
      onNew={handleNew} onEdit={handleEdit} onDelete={handleDelete}
      onOpenTypeManager={() => setView('typeManager')} />
    <Toast messages={toastMessages} onClose={() => setToastMessages([])} />
  </>;
}

const CATEGORY_LABELS = {
  fabric: '원단', material: '부자재', sewing: '봉제',
  dyeing: '염색', tenter: '텐타', transfer: '전사', printing: '나염'
};
const CATEGORY_ICONS = {
  fabric: '🧵', material: '🔧', sewing: '🏭',
  dyeing: '🎨', tenter: '🌡', transfer: '📄', printing: '🖨'
};
const DEFAULT_UNITS = {
  fabric: 'Y', material: 'ea', sewing: '장',
  dyeing: 'kg', tenter: 'Y', transfer: '판', printing: '판'
};
const ITEM_NAME_LABEL = {
  fabric: '원단명', material: '부자재명', sewing: '상품명',

function VendorsView() {
  const [vendors, setVendors] = useState(() => {
    const loaded = storage.get('el_vendors', []);
    return migrateVendors(loaded);
  });
  const [products, setProducts] = useState(() => storage.get('el_products', []));
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [showAddModal, setShowAddModal] = useState(false);
  const [editingVendor, setEditingVendor] = useState(null);

  // localStorage 변경 감지
  useEffect(() => {
    const interval = setInterval(() => {
      const latest = migrateVendors(storage.get('el_vendors', []));
      if (JSON.stringify(latest) !== JSON.stringify(vendors)) {
        setVendors(latest);
      }
      const latestProducts = storage.get('el_products', []);
      if (latestProducts.length !== products.length) setProducts(latestProducts);
    }, 1500);
    return () => clearInterval(interval);
  }, [vendors, products]);

  const saveVendors = (newVendors) => {
    setVendors(newVendors);
    storage.set('el_vendors', newVendors);
  };

  const filtered = useMemo(() => {
    return vendors.filter(v => {
      if (filter !== 'all' && v.category !== filter) return false;
      if (search) {
        const q = search.toLowerCase();
        if (!v.name.toLowerCase().includes(q) && 
            !(v.items || []).some(i => i.name?.toLowerCase().includes(q))) return false;
      }
      return true;
    });
  }, [vendors, filter, search]);

  const handleDelete = (v) => {
    const linkedCount = (v.items || []).reduce((s, i) => s + (i.linkedProductIds?.length || 0), 0);
    const msg = linkedCount > 0
      ? `⚠️ "${v.name}" 거래처는 상품 ${linkedCount}개에 연결되어 있습니다.\n\n정말 삭제하시겠습니까?\n(상품은 그대로 유지됩니다)`
      : `"${v.name}" 거래처를 삭제하시겠습니까?`;
    if (confirm(msg)) {
      saveVendors(vendors.filter(x => x.id !== v.id));
    }
  };

  const handleSaveVendor = (vendor) => {
    const existing = vendors.find(v => v.id === vendor.id);
    if (existing) {
      saveVendors(vendors.map(v => v.id === vendor.id ? vendor : v));
    } else {
      saveVendors([...vendors, vendor]);
    }
    setShowAddModal(false);
    setEditingVendor(null);
  };

  return (
    <div className="space-y-6">
      <div className="main-card p-5">
        <div className="flex flex-wrap items-center gap-3">
          <button className="btn-primary" onClick={() => { setEditingVendor(null); setShowAddModal(true); }}>
            ➕ 수동 등록
          </button>
          <input type="text" placeholder="🔍 업체명/품목 검색..." value={search}
            onChange={e => setSearch(e.target.value)} className="input-field max-w-xs" />
          <div className="flex-1"></div>
          <div className="flex gap-1 flex-wrap">
            <button onClick={() => setFilter('all')}
              className={`px-3 py-1.5 rounded-lg text-xs ${filter === 'all' ? 'bg-gray-900 text-white' : 'bg-white border'}`}>
              전체 ({vendors.length})
            </button>
            {Object.entries(CATEGORY_LABELS).map(([k, v]) => {
              const count = vendors.filter(ven => ven.category === k).length;
              if (count === 0) return null;
              return (
                <button key={k} onClick={() => setFilter(k)}
                  className={`px-3 py-1.5 rounded-lg text-xs ${filter === k ? 'bg-gray-900 text-white' : 'bg-white border'}`}>
                  {CATEGORY_ICONS[k]} {v} ({count})
                </button>
              );
            })}
          </div>
        </div>
      </div>

      {filtered.length === 0 ? (
        <div className="placeholder-box">
          <div className="text-5xl mb-4 opacity-40">🏢</div>
          <div className="text-lg font-medium text-gray-700 mb-2">등록된 거래처가 없습니다</div>
          <div className="text-sm text-gray-500">
            상품 등록 시 자동 취합되거나, <strong>➕ 수동 등록</strong> 버튼으로 추가할 수 있습니다
          </div>
        </div>
      ) : (
        <div className="grid gap-3 grid-cols-1 md:grid-cols-2 lg:grid-cols-3">
          {filtered.map(v => (
            <VendorCard key={v.id} vendor={v} products={products}
              onEdit={() => { setEditingVendor(v); setShowAddModal(true); }}
              onDelete={() => handleDelete(v)} />
          ))}
        </div>
      )}

      {showAddModal && (
        <VendorEditModal vendor={editingVendor} products={products}
          onSave={handleSaveVendor}
          onClose={() => { setShowAddModal(false); setEditingVendor(null); }} />
      )}
    </div>
  );
}

                    </span>
                  ) : (
                    <span className="inline-block px-1.5 py-0.5 rounded text-[9px] font-semibold bg-gray-200 text-gray-700">
                      ✏️ 수기
