                    <div className="flex items-center justify-between mb-2">
                      <span className={`inline-block px-1.5 py-0.5 rounded text-[9px] font-semibold ${isLinked ? 'bg-blue-100 text-blue-700' : 'bg-gray-200 text-gray-700'}`}>
                        {isLinked ? '🔗 상품매칭' : '✏️ 수기'}
                      </span>
                      <button onClick={() => removeItem(idx)} className="text-xs text-red-400">✕ 제거</button>
                    </div>
                    <div className="space-y-2">
                      {/* 봉제/가공은 상품 드롭다운 + 직접 입력 */}
                      {needsProductSuggestion ? (
                        <div>
                          <input type="text" placeholder={`${ITEM_NAME_LABEL[form.category]} (드롭다운 또는 직접 입력)`}
                            value={item.name}
                            onChange={e => updateItem(idx, 'name', e.target.value)}
                            list={`products-list-${idx}`}
                            className="input-field-sm" />
                          <datalist id={`products-list-${idx}`}>
                            {products.map(p => <option key={p.id} value={p.name} />)}
                          </datalist>
                        </div>
                      ) : (
                        <input type="text" placeholder={ITEM_NAME_LABEL[form.category]}
                          value={item.name}
                          onChange={e => updateItem(idx, 'name', e.target.value)}
                          className="input-field-sm" />
                      )}
                      <div className="flex gap-1">
                        <input type="number" placeholder="단가" value={item.price || ''}
                          onChange={e => updateItem(idx, 'price', parseFloat(e.target.value) || 0)}
                          className="input-field-sm flex-1" />
                        <select value={item.unit}
                          onChange={e => updateItem(idx, 'unit', e.target.value)}
                          className="input-field-sm w-24">
                          <option value="Y">Y</option>
                          <option value="kg">kg</option>
                          <option value="ea">ea</option>
                          <option value="장">장</option>
                          <option value="판">판</option>
                        </select>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          <div className="flex gap-2 justify-end">
            <button onClick={onClose} className="btn-secondary">취소</button>
            <button onClick={() => onSave(form)} disabled={!canSave} className="btn-primary">
              💾 저장
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

        {tabMeta.label}
      </div>
      <div className="text-sm text-gray-500">이 영역은 곧 구현됩니다</div>
    </div>
  );
}

          <span className="text-3xl">👋</span>
          <h2 className="text-2xl font-semibold text-gray-900">환영합니다</h2>

        <div className="text-sm font-semibold text-gray-700 mb-4">시작 가이드</div>
        <div className="space-y-3 text-sm text-gray-600">
          <div className="flex gap-3">
            <span className="w-6 h-6 rounded-full bg-gray-100 flex items-center justify-center text-xs font-semibold">1</span>
            <div>
              <span className="font-medium text-gray-900">상품 등록 (1-1)</span>
              <p className="text-gray-500 mt-0.5">타입 선택 → 마인드맵에 원단/부자재/봉제/가공 정보 입력</p>
            </div>
          </div>
          <div className="flex gap-3">
            <span className="w-6 h-6 rounded-full bg-gray-100 flex items-center justify-center text-xs font-semibold">2</span>

              <span className="font-medium text-gray-900">거래처 자동 취합 (3)</span>

// ═══════════════════════════════════════════════════════════
// App
// ═══════════════════════════════════════════════════════════
function ProductionView() {
  const [orders, setOrders] = useState(() => storage.get('el_orders', []));
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');
  const [selectedOrder, setSelectedOrder] = useState(null);

  // 주기적으로 localStorage 업데이트 반영
  useEffect(() => {
    const interval = setInterval(() => {
      const latest = storage.get('el_orders', []);
      if (latest.length !== orders.length) setOrders(latest);
    }, 1000);
    return () => clearInterval(interval);
  }, [orders]);

  const filtered = useMemo(() => {
    return orders.filter(o => {
      if (filter !== 'all' && o.type !== filter) return false;
      if (search && !o.productName?.includes(search) && !o.orderNo?.includes(search)) return false;
      return true;
    }).sort((a, b) => b.createdAt - a.createdAt);
  }, [orders, search, filter]);

  const handleDelete = (id) => {
    if (confirm('이 발주 이력을 삭제하시겠습니까?')) {
      const newOrders = orders.filter(o => o.id !== id);
      setOrders(newOrders);
      storage.set('el_orders', newOrders);
    }
  };

  const handleClearAll = () => {
    if (confirm('⚠️ 모든 발주 이력을 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) {
      setOrders([]);
      storage.set('el_orders', []);
    }
  };

  const typeLabel = { fabric: '🧵 원단 발주', material: '🔧 부자재 발주' };
  const methodLabel = { copy: '📋 복사', sms: '📱 문자', email: '📧 메일', share: '💬 공유', pdf: '📄 PDF' };

  return (
    <div className="space-y-6">
      <div className="main-card p-5">
        <div className="text-sm font-semibold text-gray-700 mb-1">📋 발주 내역</div>
        <div className="text-xs text-gray-500 mb-4">1-1 상품마스터의 [⚡ 신속주문]에서 생성된 발주서 이력입니다</div>
        <div className="flex flex-wrap items-center gap-3">
          <input type="text" placeholder="🔍 상품명 또는 발주번호..." value={search}
            onChange={e => setSearch(e.target.value)} className="input-field max-w-xs" />
          <div className="flex gap-1 text-xs">
            <button onClick={() => setFilter('all')}
              className={`px-3 py-1.5 rounded ${filter === 'all' ? 'bg-gray-900 text-white' : 'bg-white border'}`}>
              전체 ({orders.length})
            </button>
            <button onClick={() => setFilter('fabric')}
              className={`px-3 py-1.5 rounded ${filter === 'fabric' ? 'bg-gray-900 text-white' : 'bg-white border'}`}>
              🧵 원단 ({orders.filter(o => o.type === 'fabric').length})
            </button>
            <button onClick={() => setFilter('material')}
              className={`px-3 py-1.5 rounded ${filter === 'material' ? 'bg-gray-900 text-white' : 'bg-white border'}`}>
              🔧 부자재 ({orders.filter(o => o.type === 'material').length})
            </button>
          </div>
          <div className="flex-1"></div>
          {orders.length > 0 && (
            <button onClick={handleClearAll} className="text-xs text-red-500 hover:text-red-700">🗑 전체 삭제</button>
          )}
        </div>
      </div>

      {filtered.length === 0 ? (
        <div className="placeholder-box">
          <div className="text-5xl mb-4 opacity-40">📋</div>
          <div className="text-lg font-medium text-gray-700 mb-2">발주 이력이 없습니다</div>
          <div className="text-sm text-gray-500">1-1 상품마스터에서 상품을 선택하고 ⚡ 신속주문 버튼을 누르면 이력이 쌓입니다</div>
        </div>
      ) : (
        <div className="space-y-3">
          {filtered.map(o => {
            const d = new Date(o.createdAt);
            const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
            return (
              <div key={o.id} className="main-card p-4 hover:shadow-md transition cursor-pointer"
                onClick={() => setSelectedOrder(o)}>
                <div className="flex items-start justify-between mb-2">
                  <div>
                    <div className="flex items-center gap-2 flex-wrap">
                      <span className="badge">{typeLabel[o.type]}</span>
                      <span className="text-xs text-gray-400">{o.orderNo}</span>
                    </div>
                    <div className="font-semibold text-gray-900 mt-1">{o.productName}</div>
                  </div>
                  <button onClick={(e) => { e.stopPropagation(); handleDelete(o.id); }}
                    className="text-xs text-gray-400 hover:text-red-500">🗑</button>
                </div>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-2 text-xs text-gray-500 mt-2">
                  <div>📅 {dateStr}</div>
                  <div>📦 {o.totalQty}장</div>
                  <div>💰 ₩{Math.round(o.totalCost || 0).toLocaleString()}</div>
                  <div>{methodLabel[o.method] || o.method}</div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* 발주서 상세 팝업 */}
      {selectedOrder && (
        <div className="modal-backdrop" onClick={() => setSelectedOrder(null)}>
          <div className="modal-body" onClick={e => e.stopPropagation()}>
            <div className="p-6">
              <div className="flex items-center justify-between mb-4">
                <h2 className="text-lg font-semibold">{typeLabel[selectedOrder.type]} 상세</h2>
                <button onClick={() => setSelectedOrder(null)} className="text-gray-400 hover:text-gray-600 text-xl">✕</button>
              </div>
              <pre className="bg-gray-50 rounded-lg p-4 text-xs whitespace-pre-wrap">{selectedOrder.text}</pre>
              <div className="flex gap-2 justify-end mt-4">
                <button onClick={async () => {
                  try {
                    await navigator.clipboard.writeText(selectedOrder.text);
                    alert('📋 클립보드에 복사되었습니다!');
                  } catch {
                    alert('복사 실패');
                  }
                }} className="btn-secondary text-xs">📋 복사</button>
                <button onClick={() => setSelectedOrder(null)} className="btn-primary">닫기</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [active, setActive] = useState('dashboard');
  const tabMeta = getTabMeta(active);

  const renderContent = () => {
    if (active === 'dashboard') return <Dashboard />;
    if (active === 'products-master') return <ProductsMaster />;
    if (active === 'production') return <ProductionView />;
    if (active === 'vendors') return <VendorsView />;
    return <Placeholder tabMeta={tabMeta} />;
  };

  return (
    <div className="flex min-h-screen">
      <Sidebar active={active} setActive={setActive} />
      <main className="flex-1 flex flex-col">
        <Header tabMeta={tabMeta} />
        <div className="p-8 flex-1">{renderContent()}</div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
