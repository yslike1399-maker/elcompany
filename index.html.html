<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>이엘컴퍼니 통합관리</title>

<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-main: #F5F5F7;
    --bg-card: #FFFFFF;
    --text-primary: #1D1D1F;
    --text-secondary: #86868B;
    --text-tertiary: #C7C7CC;
    --border: #E5E5EA;
    --border-light: #F2F2F7;
    --hover: #FAFAFA;
    --active: #F0F0F2;
    --accent: #1D1D1F;
    --status-red: #FF3B30;
    --status-orange: #FF9500;
    --status-green: #34C759;
  }
  body {
    font-family: 'Inter', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-main);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
  }
  .logo-main {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    letter-spacing: 0.15em;
  }
  .sidebar-item {
    transition: background 0.15s ease;
  }
  .sidebar-item:hover {
    background: var(--hover);
  }
  .sidebar-item.active {
    background: var(--active);
    font-weight: 600;
  }
  .sub-item {
    padding-left: 2.75rem;
    font-size: 0.875rem;
    color: var(--text-secondary);
    transition: all 0.15s ease;
  }
  .sub-item:hover {
    color: var(--text-primary);
    background: var(--hover);
  }
  .sub-item.active {
    color: var(--text-primary);
    background: var(--active);
    font-weight: 600;
  }
  .accordion-arrow {
    transition: transform 0.2s ease;
  }
  .accordion-arrow.open {
    transform: rotate(90deg);
  }
  .main-card {
    background: var(--bg-card);
    border-radius: 16px;
    border: 1px solid var(--border);
  }
  .placeholder-box {
    background: var(--bg-card);
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 4rem 2rem;
    text-align: center;
  }
  .version-badge {
    font-size: 0.625rem;
    color: var(--text-tertiary);
    letter-spacing: 0.05em;
  }
  /* 스크롤바 */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #D1D1D6; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #AEAEB2; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

// ─── 메뉴 구조 ────────────────────────────────────────
const MENU = [
  {
    id: 'dashboard',
    label: '대시보드',
    icon: '🏠',
    type: 'single',
  },
  {
    id: 'products',
    label: '상품관리',
    number: '1',
    icon: '📦',
    type: 'group',
    children: [
      { id: 'products-master', label: '상품마스터', number: '1-1' },
      { id: 'products-soldout', label: '품절관리', number: '1-2' },
    ],
  },
  {
    id: 'materials',
    label: '원단 & 부자재',
    number: '2',
    icon: '🧵',
    type: 'group',
    children: [
      { id: 'fabric-list', label: '원단 관리', number: '2-1' },
      { id: 'sub-materials', label: '부자재 관리', number: '2-2' },
      { id: 'fabric-vendor', label: '원단거래처', number: '2-3' },
      { id: 'sub-material-vendor', label: '부자재거래처', number: '2-4' },
    ],
  },
  {
    id: 'outsourcing',
    label: '외주공정 관리',
    number: '3',
    icon: '🏭',
    type: 'group',
    children: [
      { id: 'sewing', label: '봉제', number: '3-1' },
      { id: 'dyeing', label: '염색', number: '3-2' },
      { id: 'tenter', label: '텐타', number: '3-3' },
      { id: 'transfer', label: '전사', number: '3-4' },
      { id: 'printing', label: '나염', number: '3-5' },
    ],
  },
  {
    id: 'production',
    label: '생산관리',
    number: '4',
    icon: '📋',
    type: 'single',
  },
  {
    id: 'delivery',
    label: '납품거래처',
    number: '5',
    icon: '🏢',
    type: 'single',
  },
];

// ─── 모든 탭의 메타 정보 ─────────────────────────────
const getTabMeta = (tabId) => {
  for (const m of MENU) {
    if (m.id === tabId) return { number: m.number, label: m.label, icon: m.icon };
    if (m.children) {
      const c = m.children.find(c => c.id === tabId);
      if (c) return { number: c.number, label: c.label, icon: m.icon };
    }
  }
  return { number: '', label: '대시보드', icon: '🏠' };
};

// ─── 사이드바 ────────────────────────────────────────
function Sidebar({ active, setActive }) {
  const [openGroups, setOpenGroups] = useState({
    products: true,
    materials: false,
    outsourcing: false,
  });

  const toggleGroup = (id) => {
    setOpenGroups(prev => ({ ...prev, [id]: !prev[id] }));
  };

  const handleMenuClick = (menu) => {
    if (menu.type === 'single') {
      setActive(menu.id);
    } else {
      toggleGroup(menu.id);
    }
  };

  return (
    <aside className="w-64 bg-white border-r border-gray-200 flex flex-col h-screen sticky top-0">
      {/* 로고 영역 */}
      <div className="px-6 py-7 border-b border-gray-100">
        <div className="logo-main text-xl text-gray-900">ELCOMPANY</div>
        <div className="text-xs text-gray-500 mt-1 font-light">이엘컴퍼니 통합관리</div>
      </div>

      {/* 메뉴 영역 */}
      <nav className="flex-1 overflow-y-auto py-3">
        {MENU.map((menu) => {
          const isGroup = menu.type === 'group';
          const isActiveMenu = active === menu.id;
          const hasActiveChild = menu.children?.some(c => c.id === active);

          return (
            <div key={menu.id}>
              <button
                onClick={() => handleMenuClick(menu)}
                className={`sidebar-item w-full flex items-center gap-3 px-6 py-3 text-left text-sm ${
                  (isActiveMenu || hasActiveChild) ? 'active' : ''
                }`}
              >
                <span className="text-base w-5">{menu.icon}</span>
                <span className="flex-1">
                  {menu.number && <span className="text-gray-400 mr-1">{menu.number}.</span>}
                  {menu.label}
                </span>
                {isGroup && (
                  <span className={`accordion-arrow text-xs text-gray-400 ${openGroups[menu.id] ? 'open' : ''}`}>
                    ▶
                  </span>
                )}
              </button>

              {/* 하위 메뉴 */}
              {isGroup && openGroups[menu.id] && (
                <div className="py-1">
                  {menu.children.map((child) => (
                    <button
                      key={child.id}
                      onClick={() => setActive(child.id)}
                      className={`sub-item w-full flex items-center gap-2 py-2 text-left ${
                        active === child.id ? 'active' : ''
                      }`}
                    >
                      <span className="text-gray-400 text-xs">{child.number}</span>
                      <span>{child.label}</span>
                    </button>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </nav>

      {/* 하단 버전 */}
      <div className="px-6 py-3 border-t border-gray-100">
        <div className="version-badge">v20260424.01</div>
      </div>
    </aside>
  );
}

// ─── 헤더 ────────────────────────────────────────────
function Header({ tabMeta }) {
  return (
    <div className="bg-white border-b border-gray-200 px-8 py-5 sticky top-0 z-10">
      <div className="flex items-center gap-3">
        <span className="text-2xl">{tabMeta.icon}</span>
        <div>
          <div className="flex items-baseline gap-2">
            {tabMeta.number && (
              <span className="text-sm text-gray-400 font-medium">{tabMeta.number}</span>
            )}
            <h1 className="text-xl font-semibold text-gray-900">{tabMeta.label}</h1>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── 플레이스홀더 ────────────────────────────────────
function Placeholder({ tabMeta }) {
  return (
    <div className="placeholder-box">
      <div className="text-5xl mb-4 opacity-40">{tabMeta.icon}</div>
      <div className="text-lg font-medium text-gray-700 mb-2">
        {tabMeta.number && <span className="text-gray-400 mr-2">{tabMeta.number}</span>}
        {tabMeta.label}
      </div>
      <div className="text-sm text-gray-500">
        이 영역은 곧 구현됩니다
      </div>
    </div>
  );
}

// ─── 대시보드 (placeholder) ──────────────────────────
function Dashboard() {
  return (
    <div className="space-y-6">
      <div className="main-card p-8">
        <div className="flex items-center gap-3 mb-2">
          <span className="text-3xl">👋</span>
          <h2 className="text-2xl font-semibold text-gray-900">환영합니다</h2>
        </div>
        <p className="text-gray-500">이엘컴퍼니 통합관리 시스템입니다.</p>
      </div>

      <div className="main-card p-6">
        <div className="text-sm font-semibold text-gray-700 mb-4">시작 가이드</div>
        <div className="space-y-3 text-sm text-gray-600">
          <div className="flex gap-3">
            <span className="w-6 h-6 rounded-full bg-gray-100 flex items-center justify-center text-xs font-semibold">1</span>
            <div>
              <span className="font-medium text-gray-900">원단 & 부자재 등록 (2번 탭)</span>
              <p className="text-gray-500 mt-0.5">원단거래처, 부자재거래처부터 등록하세요</p>
            </div>
          </div>
          <div className="flex gap-3">
            <span className="w-6 h-6 rounded-full bg-gray-100 flex items-center justify-center text-xs font-semibold">2</span>
            <div>
              <span className="font-medium text-gray-900">외주공정 업체 등록 (3번 탭)</span>
              <p className="text-gray-500 mt-0.5">봉제·염색·텐타·전사·나염 업체 정보를 입력하세요</p>
            </div>
          </div>
          <div className="flex gap-3">
            <span className="w-6 h-6 rounded-full bg-gray-100 flex items-center justify-center text-xs font-semibold">3</span>
            <div>
              <span className="font-medium text-gray-900">상품 등록 (1번 탭)</span>
              <p className="text-gray-500 mt-0.5">원단·부자재·공정을 연결하여 상품을 등록하세요</p>
            </div>
          </div>
          <div className="flex gap-3">
            <span className="w-6 h-6 rounded-full bg-gray-100 flex items-center justify-center text-xs font-semibold">4</span>
            <div>
              <span className="font-medium text-gray-900">재고 & 생산 관리 (1-2, 4번 탭)</span>
              <p className="text-gray-500 mt-0.5">품절 현황을 확인하고 생산을 발주하세요</p>
            </div>
          </div>
        </div>
      </div>

      <div className="main-card p-6 bg-gray-50 border-dashed">
        <div className="text-sm text-gray-500 text-center">
          💡 전체 구조가 완성된 후 대시보드에 실시간 현황 위젯이 추가됩니다
        </div>
      </div>
    </div>
  );
}

// ─── 메인 앱 ────────────────────────────────────────
function App() {
  const [active, setActive] = useState('dashboard');
  const tabMeta = getTabMeta(active);

  return (
    <div className="flex min-h-screen">
      <Sidebar active={active} setActive={setActive} />
      <main className="flex-1 flex flex-col">
        <Header tabMeta={tabMeta} />
        <div className="p-8 flex-1">
          {active === 'dashboard' ? <Dashboard /> : <Placeholder tabMeta={tabMeta} />}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
